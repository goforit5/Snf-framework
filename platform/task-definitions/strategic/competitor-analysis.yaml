id: competitor-analysis
name: Competitor Facility Analysis & Benchmarking
version: 1.0.0
domain: strategic
agentId: market-intelligence-agent
description: >
  Performs competitive analysis of SNFs in Ensign facility markets using CMS
  Care Compare data, state survey results, staffing data (PBJ), quality
  measures, and payer mix estimates. Identifies competitor facilities gaining
  or losing Five-Star ratings, tracks competitor staffing levels and survey
  deficiency patterns, monitors new facility construction and closures in
  market areas, and generates competitive positioning reports. When a competitor
  facility receives a poor survey or drops star ratings, that creates a referral
  capture opportunity. When a competitor improves, it signals potential referral loss.

model: sonnet
tools:
  - cms_get_facility_quality
  - cms_get_survey_results
maxTurns: 10

trigger:
  type: schedule
  config:
    cron: "0 4 * * 1"
    timezone: America/Chicago

steps:
  - name: fetch-ensign-facilities
    description: Pull Ensign facility list with CMS certification numbers and market areas
    tool: internal.facilities.getAll
    input:
      includeMarketArea: true
      includeCmsId: true
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: fetch-competitor-data
    description: Pull CMS Care Compare data for competitor facilities in each Ensign market
    tool: cms.careCompare.getByMarket
    input:
      markets: "{{steps.fetch-ensign-facilities.output.marketAreas}}"
      includeRatings: true
      includeStaffing: true
      includeSurveys: true
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: analyze-competitive-position
    description: >
      Benchmark Ensign facilities against local competitors on star ratings,
      quality measures, staffing ratios, and survey performance. Identify
      referral capture opportunities and competitive threats.
    tool: claude.analyze
    input:
      prompt: competitive_position_analysis
      context:
        - "{{steps.fetch-ensign-facilities.output}}"
        - "{{steps.fetch-competitor-data.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-decision
    description: Submit competitive intelligence to decision queue for regional VPs and strategy team
    tool: decision-queue.submit
    input:
      type: competitor-analysis
      priority: "{{steps.analyze-competitive-position.output.priority}}"
      report: "{{steps.analyze-competitive-position.output}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 2
governanceOverrides:
  - condition: "no_significant_changes == true"
    level: 1
    reason: No significant competitive changes — auto-file weekly benchmark report
  - condition: "competitor_closure_or_downgrade == true"
    level: 3
    reason: Competitor facility closure or rating downgrade — admissions opportunity, notify regional VP
  - condition: "ensign_facility_losing_position == true"
    level: 4
    reason: Ensign facility losing competitive position — requires regional VP action plan

requiredConnectors:
  - cms
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
    marketArea:
      type: string
  required: []
outputSchema:
  type: object
  properties:
    marketSummaries:
      type: array
    competitiveThreats:
      type: array
    captureOpportunities:
      type: array
    benchmarkScores:
      type: object

schedule: "0 4 * * 1"
timeout: 7m
tags:
  - competitor
  - market-analysis
  - five-star
  - benchmarking
  - strategy
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
