id: work-order-triage
name: Maintenance Work Order Triage & Prioritization
version: 1.0.0
domain: operations
agentId: facilities-agent
description: >
  Triages incoming maintenance work orders by analyzing urgency, safety impact,
  regulatory implications, and resident impact. Classifies work orders into
  priority tiers (emergency, urgent, routine, scheduled), assigns to appropriate
  maintenance staff based on skill requirements and availability, estimates
  completion time, and identifies work orders that trigger regulatory reporting
  (e.g., life safety system failures, water damage in resident areas). A broken
  call light is a CMS survey deficiency — this task ensures nothing falls
  through the cracks.

trigger:
  type: event
  config:
    event: workorder.created
    filter: "status == 'new'"

steps:
  - name: fetch-work-order
    description: Pull work order details including location, description, and reporter info
    tool: cmms.workOrders.get
    input:
      workOrderId: "{{event.workOrderId}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: check-regulatory-impact
    description: Evaluate if the work order involves life safety, infection control, or ADA systems
    tool: claude.analyze
    input:
      prompt: work_order_regulatory_classification
      context:
        - "{{steps.fetch-work-order.output}}"
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: find-available-staff
    description: Identify available maintenance staff with required skills
    tool: cmms.staff.getAvailable
    input:
      facilityId: "{{event.facilityId}}"
      skillRequired: "{{steps.check-regulatory-impact.output.skillRequired}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: submit-decision
    description: Submit triaged work order to decision queue for maintenance supervisor
    tool: decision-queue.submit
    input:
      type: work-order-triage
      priority: "{{steps.check-regulatory-impact.output.priority}}"
      workOrder: "{{steps.fetch-work-order.output}}"
      classification: "{{steps.check-regulatory-impact.output}}"
      assignmentOptions: "{{steps.find-available-staff.output}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "priority == 'routine' && no_regulatory_impact == true"
    level: 2
    reason: Routine work order with no regulatory impact — auto-assign to next available tech
  - condition: "life_safety_system == true"
    level: 5
    reason: Life safety system affected (fire alarm, sprinkler, generator) — escalate to administrator
  - condition: "resident_safety_risk == true"
    level: 5
    reason: Immediate resident safety risk — escalate for emergency response

requiredConnectors:
  - cmms
inputSchema:
  type: object
  properties:
    workOrderId:
      type: string
    facilityId:
      type: string
  required:
    - workOrderId
    - facilityId
outputSchema:
  type: object
  properties:
    classification:
      type: string
      enum:
        - emergency
        - urgent
        - routine
        - scheduled
    regulatoryFlag:
      type: boolean
    assignedTo:
      type: string
    estimatedCompletion:
      type: string

schedule: null
timeout: 3m
tags:
  - maintenance
  - work-order
  - life-safety
  - facilities
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
