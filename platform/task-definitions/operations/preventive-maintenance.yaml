id: preventive-maintenance
name: Preventive Maintenance Scheduling & Tracking
version: 1.0.0
domain: operations
agentId: facilities-agent
description: >
  Manages preventive maintenance schedules for all facility equipment and systems.
  Tracks PM due dates for HVAC, fire suppression, elevators, generators, kitchen
  equipment, medical gas, nurse call systems, and water management. Generates
  work orders before due dates, verifies completion documentation, and maintains
  audit-ready logs. CMS Life Safety Code (F-tags F900-F945) requires documented
  PM programs. State fire marshals and Joint Commission surveyors review PM logs
  during every inspection. A single missed PM on a fire alarm panel can result
  in Immediate Jeopardy.

trigger:
  type: schedule
  config:
    cron: "0 6 * * 1"
    timezone: facility_local

steps:
  - name: fetch-pm-schedule
    description: Pull all preventive maintenance items due within the next 30 days
    tool: cmms.pm.getUpcoming
    input:
      lookAheadDays: 30
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: check-overdue
    description: Identify any overdue preventive maintenance items
    tool: cmms.pm.getOverdue
    input:
      includeLastCompleted: true
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: verify-vendor-contracts
    description: Check vendor service contracts for equipment requiring third-party PM
    tool: cmms.vendors.getContractStatus
    input:
      equipmentIds: "{{steps.fetch-pm-schedule.output.vendorServiceIds}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: generate-pm-plan
    description: Generate prioritized PM plan with assignments, vendor coordination, and compliance flags
    tool: claude.analyze
    input:
      prompt: preventive_maintenance_planning
      context:
        - "{{steps.fetch-pm-schedule.output}}"
        - "{{steps.check-overdue.output}}"
        - "{{steps.verify-vendor-contracts.output}}"
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: submit-decision
    description: Submit PM plan to decision queue for maintenance director review
    tool: decision-queue.submit
    input:
      type: preventive-maintenance
      priority: "{{steps.generate-pm-plan.output.priority}}"
      plan: "{{steps.generate-pm-plan.output}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "overdue_count == 0 && all_vendors_contracted == true"
    level: 2
    reason: No overdue items and all vendor contracts current — auto-generate work orders
  - condition: "overdue_life_safety == true"
    level: 5
    reason: Life safety equipment PM overdue — escalate to administrator, potential IJ risk
  - condition: "vendor_contract_expired == true"
    level: 4
    reason: Vendor service contract expired for critical equipment — requires procurement action

requiredConnectors:
  - cmms
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
    lookAheadDays:
      type: integer
  required: []
outputSchema:
  type: object
  properties:
    upcomingPMs:
      type: array
    overduePMs:
      type: array
    vendorCoordination:
      type: array
    complianceStatus:
      type: string

schedule: "0 6 * * 1"
timeout: 5m
tags:
  - preventive-maintenance
  - life-safety
  - compliance
  - facilities
  - f900-f945
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
