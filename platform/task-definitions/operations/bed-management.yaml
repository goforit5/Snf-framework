id: bed-management
name: Bed Management & Census Optimization
version: 1.0.0
domain: operations
agentId: admissions-ops-agent
description: >
  Manages real-time bed availability across the facility. Tracks occupied beds,
  pending discharges, pending admissions, bed holds (hospital transfers, therapeutic
  leave), and rooms requiring turnover/deep clean. Optimizes bed assignments based
  on payer mix targets, isolation requirements, gender-appropriate room assignments,
  and acuity-based staffing zones. Coordinates with housekeeping for room readiness
  and with admissions for intake scheduling. Accurate bed management directly
  impacts revenue — every empty bed is $200-500/day in lost revenue.

trigger:
  type: schedule
  config:
    cron: "0 6,14 * * *"
    timezone: facility_local

steps:
  - name: fetch-census-snapshot
    description: Pull current census with bed assignments, payer types, and acuity levels from PCC
    tool: pcc.census.getSnapshot
    input:
      facilityId: "{{context.facilityId}}"
      includeDetails: true
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-pending-movements
    description: Pull pending admissions, discharges, and transfers for the next 72 hours
    tool: pcc.census.getPendingMovements
    input:
      facilityId: "{{context.facilityId}}"
      lookAheadHours: 72
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: fetch-room-status
    description: Pull room readiness status from housekeeping (clean, dirty, in-progress, isolation)
    tool: cmms.rooms.getStatus
    input:
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: optimize-assignments
    description: >
      Generate optimal bed assignment recommendations balancing payer mix targets,
      isolation requirements, gender compliance, acuity zones, and revenue impact.
    tool: claude.analyze
    input:
      prompt: bed_assignment_optimization
      context:
        - "{{steps.fetch-census-snapshot.output}}"
        - "{{steps.fetch-pending-movements.output}}"
        - "{{steps.fetch-room-status.output}}"
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: submit-decision
    description: Submit bed management recommendations to decision queue for admissions coordinator
    tool: decision-queue.submit
    input:
      type: bed-management
      priority: "{{steps.optimize-assignments.output.priority}}"
      recommendations: "{{steps.optimize-assignments.output}}"
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "occupancy_rate > 0.95"
    level: 2
    reason: High occupancy with standard assignments — auto-publish bed board
  - condition: "isolation_room_needed == true && none_available == true"
    level: 5
    reason: Isolation room needed but none available — escalate for infection control decision
  - condition: "payer_mix_below_target == true && revenue_impact > 10000"
    level: 4
    reason: Payer mix significantly below target — requires admissions director strategy review

requiredConnectors:
  - pcc
  - cmms
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required:
    - facilityId
outputSchema:
  type: object
  properties:
    availableBeds:
      type: integer
    occupancyRate:
      type: number
    pendingAdmissions:
      type: integer
    pendingDischarges:
      type: integer
    assignmentRecommendations:
      type: array

schedule: "0 6,14 * * *"
timeout: 3m
tags:
  - bed-management
  - census
  - admissions
  - revenue
  - operations
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
