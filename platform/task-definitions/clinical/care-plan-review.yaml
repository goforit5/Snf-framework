id: care-plan-review
name: Comprehensive Care Plan Review & Update
version: 1.0.0
domain: clinical
agentId: care-coordination-agent
description: >
  Performs automated care plan reviews on regulatory schedule (within 21 days
  of admission, then quarterly) and on significant change of condition. Pulls
  all clinical data from PCC — MDS assessments, physician orders, nursing notes,
  therapy progress, medication changes, incident reports, and lab trends — to
  evaluate whether the current care plan addresses all active problems. Identifies
  care plan gaps (documented problems without interventions), stale interventions
  (no progress notes in 30+ days), and new clinical findings requiring care plan
  additions. CMS F-tag F656 requires comprehensive person-centered care plans.

trigger:
  type: event
  config:
    event: care_plan.review.due
    filter: "status in ['admission', 'quarterly', 'significant_change']"

steps:
  - name: fetch-care-plan
    description: Pull current comprehensive care plan with all active problems and interventions
    tool: pcc.carePlan.get
    input:
      residentId: "{{event.residentId}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: fetch-clinical-data
    description: Pull recent clinical data — diagnoses, orders, nursing notes, incidents, labs
    tool: pcc.clinical.context
    input:
      residentId: "{{event.residentId}}"
      include:
        - diagnoses
        - orders
        - nursing_notes
        - incidents
        - labs
        - medications
      lookbackDays: 90
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-mds-assessment
    description: Retrieve most recent MDS assessment data for comprehensive review
    tool: pcc.assessments.get
    input:
      residentId: "{{event.residentId}}"
      assessmentType: mds
      mostRecent: true
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: fetch-therapy-status
    description: Pull therapy goals, progress, and discharge recommendations
    tool: pcc.therapy.getProgress
    input:
      residentId: "{{event.residentId}}"
      lookbackDays: 90
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: analyze-care-plan
    description: >
      Compare current care plan against all clinical evidence. Identify gaps
      (active problems without interventions), stale interventions (no recent
      progress documentation), resolved problems that can be closed, and new
      clinical findings requiring care plan additions. Evaluate person-centered
      preferences alignment. Generate prioritized update recommendations.
    tool: claude.analyze
    input:
      prompt: care_plan_review_analysis
      context:
        - "{{steps.fetch-care-plan.output}}"
        - "{{steps.fetch-clinical-data.output}}"
        - "{{steps.fetch-mds-assessment.output}}"
        - "{{steps.fetch-therapy-status.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-decision
    description: Submit care plan review findings to decision queue for IDT review
    tool: decision-queue.submit
    input:
      type: care-plan-review
      priority: "{{steps.analyze-care-plan.output.priority}}"
      report: "{{steps.analyze-care-plan.output}}"
      residentId: "{{event.residentId}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 4
governanceOverrides:
  - condition: "no_gaps_found == true && no_new_findings == true"
    level: 2
    reason: Care plan current and comprehensive — approve with documentation only
  - condition: "significant_change_of_condition == true"
    level: 5
    reason: Significant change of condition — requires physician, DON, and IDT co-review
  - condition: "care_plan_gaps > 3"
    level: 5
    reason: Multiple care plan gaps identified — requires urgent IDT meeting and remediation

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    residentId:
      type: string
    facilityId:
      type: string
    reviewType:
      type: string
      enum:
        - admission
        - quarterly
        - significant_change
  required:
    - residentId
    - facilityId
outputSchema:
  type: object
  properties:
    gapsIdentified:
      type: array
    staleInterventions:
      type: array
    newFindings:
      type: array
    updateRecommendations:
      type: array

schedule: null
timeout: 5m
tags:
  - care-plan
  - mds
  - person-centered
  - f656
  - cms-required
  - idt
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
