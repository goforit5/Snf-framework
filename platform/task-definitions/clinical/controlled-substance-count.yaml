id: controlled-substance-count
name: Shift-Change Controlled Substance Verification
version: 1.0.0
domain: clinical
agentId: pharmacy-agent
description: >
  Verifies controlled substance (Schedule II-V) inventory at every shift change.
  Pulls the expected count from PCC's medication administration records (MARs),
  compares against the physical count entered by the outgoing and incoming nurses,
  and flags any discrepancies. DEA regulations and state pharmacy boards require
  accurate controlled substance accountability. Discrepancies trigger immediate
  investigation workflow per facility policy. This task also tracks perpetual
  inventory trends to identify potential diversion patterns across shifts,
  nurses, and specific medications.

model: sonnet
tools:
  - pcc_get_medications
  - pcc_get_orders
maxTurns: 8

trigger:
  type: event
  config:
    event: shift.change.initiated
    filter: "shift_type in ['day', 'evening', 'night']"

steps:
  - name: fetch-expected-counts
    description: >
      Calculate expected controlled substance quantities from PCC MARs:
      prior count + received - administered - wasted - returned = expected count.
    tool: pcc.medications.controlledSubstanceLedger
    input:
      facilityId: "{{event.facilityId}}"
      unit: "{{event.unit}}"
      shiftStart: "{{event.outgoingShiftStart}}"
      shiftEnd: "{{event.shiftChangeTime}}"
      schedules:
        - II
        - III
        - IV
        - V
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-physical-counts
    description: Retrieve the physical count entries submitted by outgoing and incoming nurses
    tool: pcc.medications.physicalCount
    input:
      facilityId: "{{event.facilityId}}"
      unit: "{{event.unit}}"
      shiftChangeId: "{{event.shiftChangeId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: compare-counts
    description: >
      Compare expected vs physical counts for each controlled substance.
      Flag discrepancies with magnitude, medication name, schedule, and
      the nurses involved. Check for patterns: same medication, same nurse,
      same shift recurring discrepancies (potential diversion signal).
    tool: claude.analyze
    input:
      prompt: controlled_substance_reconciliation
      context:
        - "{{steps.fetch-expected-counts.output}}"
        - "{{steps.fetch-physical-counts.output}}"
      lookbackShifts: 30
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: log-verification
    description: Record the verification result in the controlled substance audit trail
    tool: audit.log
    input:
      eventType: controlled-substance-verification
      facilityId: "{{event.facilityId}}"
      unit: "{{event.unit}}"
      shiftChangeId: "{{event.shiftChangeId}}"
      result: "{{steps.compare-counts.output}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

  - name: route-discrepancies
    description: >
      If discrepancies found, submit to decision queue with severity based on
      schedule and magnitude. Schedule II discrepancies always escalate.
    tool: decision-queue.submit
    input:
      type: controlled-substance-discrepancy
      severity: "{{steps.compare-counts.output.maxSeverity}}"
      discrepancies: "{{steps.compare-counts.output.discrepancies}}"
      diversionRiskScore: "{{steps.compare-counts.output.diversionRiskScore}}"
      facilityId: "{{event.facilityId}}"
      unit: "{{event.unit}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 4
governanceOverrides:
  - condition: "discrepancy_count == 0"
    level: 1
    reason: Counts match — auto-log verification, no human action needed
  - condition: "schedule_ii_discrepancy == true"
    level: 6
    reason: Schedule II discrepancy (opioids, stimulants) — immediate DON/administrator notification required
  - condition: "diversion_risk_score > 0.7"
    level: 6
    reason: High diversion risk pattern detected — escalate to administrator and compliance officer
  - condition: "discrepancy_magnitude > 2"
    level: 5
    reason: Discrepancy of 3+ units requires dual sign-off and incident report

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
    unit:
      type: string
    shiftChangeId:
      type: string
  required:
    - facilityId
    - unit
    - shiftChangeId
outputSchema:
  type: object
  properties:
    verified:
      type: boolean
    discrepancies:
      type: array
    diversionRiskScore:
      type: number
    totalMedicationsChecked:
      type: integer

schedule: null
timeout: 5m
tags:
  - pharmacy
  - controlled-substance
  - dea-compliance
  - diversion-prevention
  - shift-change
  - schedule-ii
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
