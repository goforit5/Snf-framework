id: dietary-assessment
name: Nutritional Status & Dietary Compliance Review
version: 1.0.0
domain: clinical
agentId: clinical-safety-agent
description: >
  Reviews nutritional status for all residents weekly and on significant weight
  change events. Pulls weight trends, BMI calculations, dietary orders, meal
  intake records, lab values (albumin, prealbumin), and MDS Section K nutrition
  data from PCC. Identifies residents at risk for malnutrition, dehydration,
  or unintended weight loss (>5% in 30 days or >10% in 180 days). CMS F-tag
  F692 requires facilities to ensure residents maintain acceptable nutritional
  status. Generates dietitian referrals and meal plan modification recommendations.

trigger:
  type: schedule
  config:
    cron: "0 8 * * 1"
    description: Weekly nutritional status review every Monday morning

steps:
  - name: fetch-weight-trends
    description: Pull weight records for all residents over the past 180 days
    tool: pcc.vitals.getWeights
    input:
      facilityId: "{{context.facilityId}}"
      lookbackDays: 180
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-dietary-orders
    description: Retrieve active dietary orders and texture modifications for all residents
    tool: pcc.dietary.getOrders
    input:
      facilityId: "{{context.facilityId}}"
      status: active
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: fetch-meal-intake
    description: Pull meal intake percentages for the past 7 days
    tool: pcc.dietary.getMealIntake
    input:
      facilityId: "{{context.facilityId}}"
      lookbackDays: 7
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: fetch-nutrition-labs
    description: Retrieve albumin and prealbumin lab results from the last 90 days
    tool: pcc.labs.getRecent
    input:
      facilityId: "{{context.facilityId}}"
      lookbackDays: 90
      labTypes:
        - albumin
        - prealbumin
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: analyze-nutritional-status
    description: >
      Calculate weight change percentages and identify significant losses.
      Correlate with meal intake trends, lab markers, and dietary compliance.
      Flag residents meeting CMS criteria for significant weight loss. Identify
      residents with low albumin (<3.5) or prealbumin (<15) indicating protein
      malnutrition risk. Generate prioritized list with intervention recommendations.
    tool: claude.analyze
    input:
      prompt: nutritional_status_analysis
      context:
        - "{{steps.fetch-weight-trends.output}}"
        - "{{steps.fetch-dietary-orders.output}}"
        - "{{steps.fetch-meal-intake.output}}"
        - "{{steps.fetch-nutrition-labs.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-decision
    description: Submit nutritional findings to clinical decision queue for dietitian review
    tool: decision-queue.submit
    input:
      type: dietary-assessment
      priority: "{{steps.analyze-nutritional-status.output.priority}}"
      report: "{{steps.analyze-nutritional-status.output}}"
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "no_significant_changes == true"
    level: 1
    reason: All residents within acceptable nutritional parameters — auto-file weekly report
  - condition: "severe_weight_loss == true"
    level: 5
    reason: Severe unintended weight loss >10% in 180 days — requires physician and dietitian co-review
  - condition: "dehydration_risk == true"
    level: 4
    reason: Dehydration indicators present — requires immediate fluid intake protocol review

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required:
    - facilityId
outputSchema:
  type: object
  properties:
    atRiskResidents:
      type: array
    significantWeightLoss:
      type: array
    lowIntakeResidents:
      type: array
    dietitianReferrals:
      type: array

schedule: "0 8 * * 1"
timeout: 5m
tags:
  - nutrition
  - dietary
  - weight-management
  - f692
  - cms-required
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
