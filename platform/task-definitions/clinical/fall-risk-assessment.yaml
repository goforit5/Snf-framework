id: fall-risk-assessment
name: Fall Risk Assessment & Intervention
version: 1.0.0
domain: clinical
agentId: clinical-safety-agent
description: >
  Evaluates fall risk for all residents on admission, quarterly, and after any
  fall event. Pulls Morse Fall Scale scores, medication profiles (sedatives,
  antihypertensives, psychotropics), mobility assessments, cognitive status
  (BIMS), and fall history from PCC. Generates a risk-stratified score and
  recommends evidence-based interventions (bed alarms, non-slip footwear,
  toileting schedules, medication review). CMS F-tag F689 requires facilities
  to ensure residents receive adequate supervision and assistance to prevent
  accidents. High-risk residents trigger immediate care plan updates.

trigger:
  type: event
  config:
    event: assessment.fall_risk.due
    filter: "status in ['admission', 'quarterly', 'post_fall']"

steps:
  - name: fetch-resident-profile
    description: Pull resident demographics, diagnoses, and cognitive status (BIMS) from PCC
    tool: pcc.resident.get
    input:
      residentId: "{{event.residentId}}"
      facilityId: "{{event.facilityId}}"
      include:
        - demographics
        - diagnoses
        - cognitive_status
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: fetch-fall-history
    description: Retrieve fall incident history from PCC for the past 12 months
    tool: pcc.incidents.list
    input:
      residentId: "{{event.residentId}}"
      incidentType: fall
      lookbackDays: 365
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: fetch-medications
    description: Pull active medications flagged as fall-risk contributors (sedatives, psychotropics, antihypertensives)
    tool: pcc.medications.list
    input:
      residentId: "{{event.residentId}}"
      status: active
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: fetch-mobility-assessment
    description: Retrieve most recent mobility and ADL assessments from PCC
    tool: pcc.assessments.get
    input:
      residentId: "{{event.residentId}}"
      assessmentType: mobility_adl
      mostRecent: true
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: calculate-risk-score
    description: >
      Analyze all clinical data using Morse Fall Scale methodology enhanced with
      medication burden scoring. Factor in BIMS cognitive score, fall history
      frequency, polypharmacy count, and mobility limitations. Output risk tier
      (low/moderate/high/critical) with contributing factors ranked by impact.
    tool: claude.analyze
    input:
      prompt: fall_risk_assessment
      context:
        - "{{steps.fetch-resident-profile.output}}"
        - "{{steps.fetch-fall-history.output}}"
        - "{{steps.fetch-medications.output}}"
        - "{{steps.fetch-mobility-assessment.output}}"
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: generate-intervention-plan
    description: Generate evidence-based intervention recommendations matched to identified risk factors
    tool: claude.generate
    input:
      template: fall_intervention_plan
      data: "{{steps.calculate-risk-score.output}}"
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: submit-decision
    description: Submit fall risk assessment and intervention plan to decision queue for nursing review
    tool: decision-queue.submit
    input:
      type: fall-risk-assessment
      priority: "{{steps.calculate-risk-score.output.riskTier}}"
      report: "{{steps.generate-intervention-plan.output}}"
      residentId: "{{event.residentId}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "risk_tier == 'low' && fall_count_12mo == 0"
    level: 1
    reason: Low risk with no fall history — auto-file assessment with standard precautions
  - condition: "risk_tier == 'critical' || fall_count_30d >= 2"
    level: 5
    reason: Critical risk or recurrent falls — requires DON review and immediate intervention
  - condition: "psychotropic_count >= 3"
    level: 5
    reason: High psychotropic burden increases fall risk — requires pharmacy and physician co-review

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    residentId:
      type: string
    facilityId:
      type: string
    assessmentReason:
      type: string
      enum:
        - admission
        - quarterly
        - post_fall
  required:
    - residentId
    - facilityId
outputSchema:
  type: object
  properties:
    riskTier:
      type: string
      enum:
        - low
        - moderate
        - high
        - critical
    riskScore:
      type: number
    contributingFactors:
      type: array
    interventions:
      type: array

schedule: null
timeout: 5m
tags:
  - fall-prevention
  - patient-safety
  - f689
  - cms-required
  - clinical-assessment
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
