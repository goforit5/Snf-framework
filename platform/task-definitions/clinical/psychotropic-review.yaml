id: psychotropic-review
name: Quarterly Psychotropic Medication Review
version: 1.0.0
domain: clinical
agentId: pharmacy-agent
description: >
  Conducts quarterly review of all psychotropic medications (antipsychotics,
  anxiolytics, sedatives/hypnotics, antidepressants) for every resident in
  the facility. CMS F-tag F758 requires gradual dose reduction (GDR) attempts
  for antipsychotics unless clinically contraindicated, and F757 requires
  that psychotropic medications are used only when clinically indicated with
  adequate monitoring. This task pulls each resident's psychotropic orders,
  diagnosis justification, behavioral monitoring notes, GDR attempt history,
  and PRN utilization data from PCC. Generates a per-resident clinical summary
  and flags residents overdue for GDR attempts, lacking documented behavioral
  indications, or with excessive PRN utilization. Critical for CMS survey
  readiness — psychotropic use is a top-5 deficiency area nationally.

model: opus
tools:
  - pcc_get_medications
  - pcc_get_orders
  - pcc_get_assessments
  - pcc_get_resident
  - pcc_get_census
  - pcc_get_care_plan
maxTurns: 15

trigger:
  type: schedule
  config:
    cron: "0 5 1 1,4,7,10 *"
    timezone: America/Los_Angeles
    description: First day of each quarter (Jan, Apr, Jul, Oct) at 5:00 AM PT

steps:
  - name: fetch-census
    description: Get current facility census for the quarterly review
    tool: pcc.census.list
    input:
      facilityId: "{{input.facilityId}}"
      status: active
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-psychotropic-orders
    description: >
      Pull all active psychotropic medication orders across the facility.
      Includes antipsychotics, anxiolytics, sedatives/hypnotics, and
      antidepressants with order dates, doses, and prescriber.
    tool: pcc.medications.listByClass
    input:
      facilityId: "{{input.facilityId}}"
      medicationClasses:
        - antipsychotic
        - anxiolytic
        - sedative-hypnotic
        - antidepressant
      status: active
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: fetch-gdr-history
    description: >
      Pull gradual dose reduction attempt history for each resident on
      antipsychotics. Includes attempt dates, outcomes, and clinical
      rationale for contraindication if GDR was not attempted.
    tool: pcc.clinical.gdrHistory
    input:
      facilityId: "{{input.facilityId}}"
      residentIds: "{{steps.fetch-psychotropic-orders.output.residentIds}}"
      lookbackMonths: 12
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: fetch-behavioral-monitoring
    description: >
      Pull behavioral monitoring notes, BIMS scores, PHQ-9 scores, and
      behavioral symptom tracking for clinical justification review.
    tool: pcc.clinical.behavioralMonitoring
    input:
      facilityId: "{{input.facilityId}}"
      residentIds: "{{steps.fetch-psychotropic-orders.output.residentIds}}"
      lookbackDays: 90
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: fetch-prn-utilization
    description: Pull PRN psychotropic administration data to identify patterns
    tool: pcc.medications.prnUtilization
    input:
      facilityId: "{{input.facilityId}}"
      residentIds: "{{steps.fetch-psychotropic-orders.output.residentIds}}"
      medicationClasses:
        - antipsychotic
        - anxiolytic
        - sedative-hypnotic
      lookbackDays: 90
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: analyze-compliance
    description: >
      For each resident on psychotropics, evaluate: (1) Is the diagnosis
      documented and clinically appropriate? (2) Is behavioral monitoring
      current and adequate? (3) For antipsychotics: is a GDR attempt
      documented in the last 6 months, or is there a valid clinical
      contraindication? (4) Is PRN utilization within acceptable thresholds?
      (5) Are there residents on multiple psychotropics requiring polypharmacy
      justification? Classify each resident as compliant, action-needed,
      or critical.
    tool: claude.analyze
    input:
      prompt: psychotropic_quarterly_review
      context:
        - "{{steps.fetch-psychotropic-orders.output}}"
        - "{{steps.fetch-gdr-history.output}}"
        - "{{steps.fetch-behavioral-monitoring.output}}"
        - "{{steps.fetch-prn-utilization.output}}"
    onSuccess: null
    onFailure: null
    timeout: 5m

  - name: generate-facility-report
    description: >
      Generate facility-level psychotropic review report with executive summary,
      per-resident findings, GDR compliance rate, action items, and CMS survey
      risk assessment.
    tool: claude.generate
    input:
      template: psychotropic_quarterly_report
      data: "{{steps.analyze-compliance.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-findings
    description: Submit findings to decision queue — one decision per resident needing action
    tool: decision-queue.submitBatch
    input:
      type: psychotropic-review
      facilityId: "{{input.facilityId}}"
      findings: "{{steps.analyze-compliance.output.residentFindings}}"
      facilityReport: "{{steps.generate-facility-report.output}}"
    onSuccess: null
    onFailure: null
    timeout: 30s

defaultGovernanceLevel: 4
governanceOverrides:
  - condition: "resident_status == 'compliant'"
    level: 2
    reason: Resident fully compliant — auto-log with notification to pharmacy
  - condition: "gdr_overdue == true AND antipsychotic == true"
    level: 5
    reason: Overdue GDR attempt on antipsychotic — requires medical director and pharmacy director sign-off
  - condition: "no_diagnosis_justification == true"
    level: 6
    reason: Psychotropic without documented diagnosis — CMS immediate jeopardy risk, escalate to DON
  - condition: "psychotropic_count >= 3"
    level: 5
    reason: Three or more concurrent psychotropics requires medical director polypharmacy review
  - condition: "prn_utilization_excessive == true"
    level: 4
    reason: Excessive PRN psychotropic use may indicate inadequate care plan

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required:
    - facilityId
outputSchema:
  type: object
  properties:
    facilityId:
      type: string
    totalResidentsReviewed:
      type: integer
    residentsOnPsychotropics:
      type: integer
    gdrComplianceRate:
      type: number
    criticalFindings:
      type: integer
    actionNeeded:
      type: integer
    compliant:
      type: integer

schedule: "0 5 1 1,4,7,10 *"
timeout: 20m
tags:
  - pharmacy
  - psychotropic
  - antipsychotic
  - gdr
  - f757
  - f758
  - cms-required
  - quarterly-review
  - survey-readiness
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
