id: infection-surveillance
name: Infection Surveillance & Outbreak Detection
version: 1.0.0
domain: clinical
agentId: infection-control-agent
description: >
  Monitors clinical indicators across all residents to detect potential infections
  and outbreak patterns early. Pulls vital signs (temperature trends), lab results
  (WBC, UA, cultures), new antibiotic orders, and symptom documentation from PCC.
  Applies McGeer Criteria for surveillance definitions in long-term care. Tracks
  facility-wide infection rates by type (UTI, respiratory, skin/soft tissue, GI)
  and flags when rates exceed baseline thresholds. CMS F-tag F880 requires
  infection prevention and control programs. Critical for CMS Five-Star rating.

trigger:
  type: schedule
  config:
    cron: "0 7,15 * * *"
    description: Twice-daily infection surveillance — morning and afternoon shifts

steps:
  - name: fetch-vital-sign-alerts
    description: Pull residents with temperature >100.4F or vital sign anomalies in last 12 hours
    tool: pcc.vitals.getAlerts
    input:
      facilityId: "{{context.facilityId}}"
      lookbackHours: 12
      thresholds:
        temperature: 100.4
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: fetch-lab-results
    description: Retrieve new culture results, UA results, and CBC with differential from last 24 hours
    tool: pcc.labs.getRecent
    input:
      facilityId: "{{context.facilityId}}"
      lookbackHours: 24
      labTypes:
        - culture
        - urinalysis
        - cbc
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: fetch-antibiotic-orders
    description: Pull new antibiotic orders placed in the last 24 hours facility-wide
    tool: pcc.medications.list
    input:
      facilityId: "{{context.facilityId}}"
      drugClass: antibiotic
      orderDateRange: last_24h
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: fetch-infection-log
    description: Retrieve current active infection tracking log for facility
    tool: pcc.infections.getLog
    input:
      facilityId: "{{context.facilityId}}"
      status: active
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: analyze-surveillance
    description: >
      Apply McGeer Criteria to identify confirmed and suspected infections.
      Calculate facility infection rates by type and compare against rolling
      3-month baseline. Detect clustering patterns (same unit, same organism,
      same timeframe) that suggest outbreak potential. Generate antibiogram
      summary for antibiotic stewardship review.
    tool: claude.analyze
    input:
      prompt: infection_surveillance_analysis
      context:
        - "{{steps.fetch-vital-sign-alerts.output}}"
        - "{{steps.fetch-lab-results.output}}"
        - "{{steps.fetch-antibiotic-orders.output}}"
        - "{{steps.fetch-infection-log.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-decision
    description: Submit surveillance findings to infection control decision queue
    tool: decision-queue.submit
    input:
      type: infection-surveillance
      priority: "{{steps.analyze-surveillance.output.priority}}"
      report: "{{steps.analyze-surveillance.output}}"
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "no_new_infections == true && rates_within_baseline == true"
    level: 1
    reason: No new infections and rates within baseline — auto-file surveillance report
  - condition: "outbreak_pattern_detected == true"
    level: 6
    reason: Potential outbreak detected — immediate infection preventionist and DON notification
  - condition: "c_diff_or_mrsa_positive == true"
    level: 5
    reason: MDRO positive culture — requires isolation protocol activation and public health reporting review

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required:
    - facilityId
outputSchema:
  type: object
  properties:
    newInfections:
      type: array
    infectionRates:
      type: object
    outbreakRisk:
      type: string
      enum:
        - none
        - low
        - moderate
        - high
    surveillanceSummary:
      type: object

schedule: "0 7,15 * * *"
timeout: 5m
tags:
  - infection-control
  - outbreak-detection
  - f880
  - cms-required
  - antibiotic-stewardship
  - five-star
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
