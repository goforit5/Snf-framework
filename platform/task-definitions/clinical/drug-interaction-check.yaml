id: drug-interaction-check
name: Real-Time Drug Interaction Alert
version: 1.0.0
domain: clinical
agentId: pharmacy-agent
description: >
  Monitors PCC medication order events in real-time and checks every new or
  modified order against the resident's full active medication list, allergy
  profile, diagnosis list, and lab values (renal/hepatic function). Flags
  drug-drug interactions, drug-allergy conflicts, therapeutic duplications,
  contraindicated conditions, and dose adjustments needed for renal/hepatic
  impairment. Severity classified as minor, moderate, major, or contraindicated.
  Major and contraindicated interactions trigger immediate pharmacist alert.

model: opus
tools:
  - pcc_get_medications
  - pcc_get_orders
  - pcc_get_lab_results
  - pcc_get_resident
maxTurns: 8

trigger:
  type: event
  config:
    event: medication.order.created
    filter: "order_type in ['new', 'changed', 'renewed']"

steps:
  - name: fetch-new-order
    description: Retrieve the full details of the new/modified medication order from PCC
    tool: pcc.medications.getOrder
    input:
      orderId: "{{event.orderId}}"
      residentId: "{{event.residentId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: fetch-active-medications
    description: Pull the complete active medication list for cross-reference
    tool: pcc.medications.list
    input:
      residentId: "{{event.residentId}}"
      status: active
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: fetch-clinical-context
    description: Pull allergies, diagnoses, and recent labs (renal/hepatic panels)
    tool: pcc.clinical.context
    input:
      residentId: "{{event.residentId}}"
      include:
        - allergies
        - diagnoses
        - labs
      labPanels:
        - renal
        - hepatic
        - cbc
      lookbackDays: 30
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: check-interactions
    description: >
      Run comprehensive interaction analysis: drug-drug (DDI), drug-allergy,
      therapeutic duplication, renal/hepatic dose adjustment, age-based
      contraindications (Beers Criteria for 65+). Classify severity and
      provide clinical recommendation for each finding.
    tool: claude.analyze
    input:
      prompt: drug_interaction_analysis
      context:
        - "{{steps.fetch-new-order.output}}"
        - "{{steps.fetch-active-medications.output}}"
        - "{{steps.fetch-clinical-context.output}}"
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: route-by-severity
    description: >
      Route findings based on severity: minor → log only, moderate → pharmacist
      review queue, major → immediate pharmacist alert, contraindicated → block
      order and escalate to prescriber.
    tool: decision-queue.submit
    input:
      type: drug-interaction
      severity: "{{steps.check-interactions.output.maxSeverity}}"
      interactions: "{{steps.check-interactions.output.interactions}}"
      residentId: "{{event.residentId}}"
      orderId: "{{event.orderId}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 2
governanceOverrides:
  - condition: "max_severity == 'major'"
    level: 4
    reason: Major drug interaction requires pharmacist approval before order proceeds
  - condition: "max_severity == 'contraindicated'"
    level: 6
    reason: Contraindicated combination — block order, escalate to prescriber
  - condition: "beers_criteria_flagged == true"
    level: 4
    reason: Beers Criteria flag for elderly resident requires clinical review
  - condition: "renal_dose_adjustment == true"
    level: 4
    reason: Renal impairment detected — dose adjustment requires pharmacist verification

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    orderId:
      type: string
    residentId:
      type: string
    facilityId:
      type: string
  required:
    - orderId
    - residentId
outputSchema:
  type: object
  properties:
    interactions:
      type: array
    maxSeverity:
      type: string
      enum:
        - none
        - minor
        - moderate
        - major
        - contraindicated
    recommendations:
      type: array

schedule: null
timeout: 3m
tags:
  - pharmacy
  - medication-safety
  - real-time
  - drug-interaction
  - beers-criteria
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
