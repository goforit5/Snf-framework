id: medication-reconciliation
name: Medication Reconciliation — New Admissions
version: 1.0.0
domain: clinical
agentId: pharmacy-agent
description: >
  Performs medication reconciliation for every new admission within 24 hours of
  facility entry. Pulls the resident's active medication list from PCC, compares
  against the transfer/discharge summary from the referring hospital, flags
  discrepancies (missing meds, dose changes, therapeutic duplications), and
  generates a reconciliation report for pharmacist review. CMS F-tag F756
  requires timely med rec. This task ensures zero-gap coverage.

trigger:
  type: event
  config:
    event: admission.created
    filter: "status == 'active'"

steps:
  - name: fetch-pcc-medications
    description: Pull current medication list from PCC for the admitted resident
    tool: pcc.medications.list
    input:
      residentId: "{{event.residentId}}"
      facilityId: "{{event.facilityId}}"
      status: active
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-transfer-summary
    description: Retrieve hospital transfer/discharge medication summary from PCC documents
    tool: pcc.documents.get
    input:
      residentId: "{{event.residentId}}"
      documentType: transfer_discharge_summary
      lookbackDays: 7
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-allergy-profile
    description: Pull allergy and adverse reaction profile for cross-reference
    tool: pcc.allergies.list
    input:
      residentId: "{{event.residentId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: analyze-discrepancies
    description: >
      Compare PCC medication list against transfer summary. Identify missing medications,
      dose discrepancies, therapeutic duplications, allergy conflicts, and medications
      that were discontinued at the hospital but still active in PCC.
    tool: claude.analyze
    input:
      prompt: medication_reconciliation_analysis
      context:
        - "{{steps.fetch-pcc-medications.output}}"
        - "{{steps.fetch-transfer-summary.output}}"
        - "{{steps.fetch-allergy-profile.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: generate-reconciliation-report
    description: Format findings into a structured reconciliation report for pharmacist/physician review
    tool: claude.generate
    input:
      template: medication_reconciliation_report
      data: "{{steps.analyze-discrepancies.output}}"
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: submit-decision
    description: Submit reconciliation findings to the decision queue for pharmacist approval
    tool: decision-queue.submit
    input:
      type: medication-reconciliation
      priority: "{{steps.analyze-discrepancies.output.priority}}"
      report: "{{steps.generate-reconciliation-report.output}}"
      residentId: "{{event.residentId}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 4
governanceOverrides:
  - condition: "discrepancy_count == 0"
    level: 2
    reason: No discrepancies found — auto-file with notification
  - condition: "high_risk_medication == true"
    level: 5
    reason: High-risk medications (anticoagulants, insulin, opioids) require dual approval
  - condition: "allergy_conflict == true"
    level: 6
    reason: Potential allergy conflict — escalate to physician immediately

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    residentId:
      type: string
    facilityId:
      type: string
  required:
    - residentId
    - facilityId
outputSchema:
  type: object
  properties:
    discrepancies:
      type: array
    riskLevel:
      type: string
    reconciliationReport:
      type: object

schedule: null
timeout: 5m
tags:
  - pharmacy
  - admission
  - medication-safety
  - f756
  - cms-required
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
