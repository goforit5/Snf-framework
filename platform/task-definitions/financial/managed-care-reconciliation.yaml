id: managed-care-reconciliation
name: Managed Care Rate Reconciliation
version: 1.0.0
domain: financial
agentId: revenue-cycle-agent
description: >
  Reconciles managed care payments against contracted rate schedules to identify
  underpayments. Pulls payment history by managed care payer from PCC, compares
  against contracted per-diem and case rates, and calculates cumulative variance
  by payer and service type. Managed care underpayments are one of the largest
  revenue leakage sources in SNF operations — industry estimates suggest 5-10%
  of managed care revenue is lost to incorrect payments. Generates payer-specific
  variance reports for renegotiation leverage.

model: sonnet
tools:
  - pcc_get_census
  - workday_get_payroll
  - bank_get_transactions
maxTurns: 10

trigger:
  type: schedule
  config:
    cron: "0 8 10 * *"
    description: Monthly managed care reconciliation on the 10th

steps:
  - name: fetch-managed-care-payments
    description: Pull all managed care payments for the prior month from PCC
    tool: pcc.billing.getPayments
    input:
      facilityId: "{{context.facilityId}}"
      payerType: managed_care
      period: prior_month
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-contracted-rates
    description: Pull contracted rate schedules for each managed care payer
    tool: workday.contracts.getRates
    input:
      facilityId: "{{context.facilityId}}"
      contractType: managed_care
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: reconcile-payments
    description: >
      Compare each payment against the contracted rate for the service provided.
      Calculate underpayments, overpayments, and correctly-paid claims. Aggregate
      variance by payer and service type. Identify systematic underpayment
      patterns (e.g., payer consistently paying at lower tier than authorized).
      Calculate annualized revenue impact of identified variances.
    tool: claude.analyze
    input:
      prompt: managed_care_reconciliation
      context:
        - "{{steps.fetch-managed-care-payments.output}}"
        - "{{steps.fetch-contracted-rates.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-decision
    description: Submit reconciliation findings to decision queue for revenue cycle director review
    tool: decision-queue.submit
    input:
      type: managed-care-reconciliation
      priority: "{{steps.reconcile-payments.output.priority}}"
      report: "{{steps.reconcile-payments.output}}"
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "total_variance_pct < 0.01"
    level: 1
    reason: Managed care payments within 1% of contracted rates — auto-file report
  - condition: "underpayment_total > 25000"
    level: 5
    reason: Monthly underpayment exceeds $25K — requires revenue cycle director and payer relations escalation
  - condition: "systematic_underpayment == true"
    level: 5
    reason: Systematic underpayment pattern detected — requires contract renegotiation action

requiredConnectors:
  - pcc
  - workday
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required:
    - facilityId
outputSchema:
  type: object
  properties:
    totalPayments:
      type: number
    totalVariance:
      type: number
    underpaymentsByPayer:
      type: array
    annualizedImpact:
      type: number

schedule: "0 8 10 * *"
timeout: 5m
tags:
  - revenue-cycle
  - managed-care
  - rate-reconciliation
  - underpayment-recovery
  - payer-relations
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
