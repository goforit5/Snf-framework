id: invoice-processing
name: Vendor Invoice Processing & Validation
version: 1.0.0
domain: financial
agentId: accounts-payable-agent
description: >
  Processes incoming vendor invoices by extracting key fields (vendor, amount,
  PO number, GL account, date), matching against purchase orders and receiving
  records in Workday, validating pricing against contracted rates, and routing
  for appropriate approval based on dollar thresholds. Flags duplicate invoices,
  pricing discrepancies, missing POs, and invoices from vendors not in the
  approved vendor master. Three-way match (PO, receipt, invoice) enables
  auto-approval for routine invoices under threshold.

model: sonnet
tools:
  - workday_get_employee
  - bank_get_transactions
  - m365_search_email
maxTurns: 10

trigger:
  type: event
  config:
    event: invoice.received
    filter: "status == 'pending'"

steps:
  - name: extract-invoice-data
    description: Extract structured data from invoice document (PDF/image) using OCR and AI
    tool: claude.analyze
    input:
      prompt: invoice_data_extraction
      document: "{{event.documentUrl}}"
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: match-purchase-order
    description: Match extracted invoice against purchase orders in Workday
    tool: workday.procurement.matchPO
    input:
      vendorId: "{{steps.extract-invoice-data.output.vendorId}}"
      poNumber: "{{steps.extract-invoice-data.output.poNumber}}"
      amount: "{{steps.extract-invoice-data.output.totalAmount}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: check-receiving
    description: Verify goods/services receipt confirmation in Workday
    tool: workday.procurement.getReceipt
    input:
      poNumber: "{{steps.extract-invoice-data.output.poNumber}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: validate-pricing
    description: Compare invoice line items against contracted pricing in vendor master
    tool: workday.vendors.validatePricing
    input:
      vendorId: "{{steps.extract-invoice-data.output.vendorId}}"
      lineItems: "{{steps.extract-invoice-data.output.lineItems}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: check-duplicates
    description: Search for duplicate invoices (same vendor, amount, invoice number within 90 days)
    tool: workday.ap.checkDuplicate
    input:
      vendorId: "{{steps.extract-invoice-data.output.vendorId}}"
      invoiceNumber: "{{steps.extract-invoice-data.output.invoiceNumber}}"
      amount: "{{steps.extract-invoice-data.output.totalAmount}}"
      lookbackDays: 90
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: submit-decision
    description: Submit validated invoice to decision queue with match results and recommendations
    tool: decision-queue.submit
    input:
      type: invoice-processing
      priority: "{{steps.validate-pricing.output.priority}}"
      invoiceData: "{{steps.extract-invoice-data.output}}"
      matchResults:
        poMatch: "{{steps.match-purchase-order.output}}"
        receiptMatch: "{{steps.check-receiving.output}}"
        pricingValid: "{{steps.validate-pricing.output}}"
        duplicateCheck: "{{steps.check-duplicates.output}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "three_way_match == true && amount <= 5000"
    level: 1
    reason: Three-way match confirmed and under $5K threshold — auto-approve for payment
  - condition: "three_way_match == true && amount <= 25000"
    level: 2
    reason: Three-way match confirmed under $25K — auto-approve with notification
  - condition: "duplicate_detected == true"
    level: 5
    reason: Potential duplicate invoice detected — requires AP manager review
  - condition: "pricing_variance > 0.10"
    level: 4
    reason: Pricing variance exceeds 10% from contract — requires procurement review
  - condition: "amount > 100000"
    level: 5
    reason: Invoice exceeds $100K — requires controller approval

requiredConnectors:
  - workday
inputSchema:
  type: object
  properties:
    documentUrl:
      type: string
    facilityId:
      type: string
  required:
    - documentUrl
outputSchema:
  type: object
  properties:
    invoiceData:
      type: object
    matchStatus:
      type: string
      enum:
        - full_match
        - partial_match
        - no_match
    discrepancies:
      type: array
    recommendedAction:
      type: string

schedule: null
timeout: 3m
tags:
  - accounts-payable
  - invoice
  - three-way-match
  - procurement
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
