id: denial-management
name: Claim Denial Analysis & Appeal Management
version: 1.0.0
domain: financial
agentId: revenue-cycle-agent
description: >
  Processes incoming claim denials by analyzing denial reason codes (CARC/RARC),
  categorizing by root cause, determining appeal potential, and generating
  appeal letters with supporting documentation. Pulls the original claim,
  clinical documentation, authorization records, and payer contract terms.
  Tracks denial patterns by payer, facility, and denial reason to identify
  systemic issues. Industry benchmarks: successful appeal rate target >50%,
  appeal turnaround <30 days. Prioritizes high-dollar denials and those
  approaching appeal deadline.

model: sonnet
tools:
  - pcc_get_resident
  - pcc_get_orders
  - pcc_get_assessments
  - pcc_get_care_plan
maxTurns: 12

trigger:
  type: event
  config:
    event: claim.denied
    filter: "status == 'denied'"

steps:
  - name: fetch-denial-details
    description: Pull denial EOB with CARC/RARC reason codes and original claim data
    tool: pcc.billing.getDenial
    input:
      claimId: "{{event.claimId}}"
      denialId: "{{event.denialId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: fetch-clinical-documentation
    description: Pull supporting clinical documentation for the denied service period
    tool: pcc.documents.get
    input:
      residentId: "{{event.residentId}}"
      dateRange:
        start: "{{event.serviceStartDate}}"
        end: "{{event.serviceEndDate}}"
      documentTypes:
        - physician_orders
        - nursing_notes
        - therapy_notes
        - assessments
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: analyze-denial
    description: >
      Analyze denial reason codes against clinical documentation and payer
      contract terms. Determine if denial is valid or appealable. Calculate
      appeal success probability based on historical outcomes for this payer
      and denial reason combination. Identify documentation gaps that caused
      the denial and recommend corrective actions.
    tool: claude.analyze
    input:
      prompt: denial_analysis_and_appeal
      context:
        - "{{steps.fetch-denial-details.output}}"
        - "{{steps.fetch-clinical-documentation.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: generate-appeal
    description: Generate appeal letter with supporting evidence if denial is appealable
    tool: claude.generate
    input:
      template: denial_appeal_letter
      data: "{{steps.analyze-denial.output}}"
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: submit-decision
    description: Submit denial analysis and appeal draft to decision queue for billing manager review
    tool: decision-queue.submit
    input:
      type: denial-management
      priority: "{{steps.analyze-denial.output.priority}}"
      denialAnalysis: "{{steps.analyze-denial.output}}"
      appealDraft: "{{steps.generate-appeal.output}}"
      deniedAmount: "{{event.deniedAmount}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 4
governanceOverrides:
  - condition: "denial_valid == true && amount < 500"
    level: 2
    reason: Valid denial under $500 — write off with notification
  - condition: "appeal_deadline_days <= 5"
    level: 5
    reason: Appeal deadline imminent — requires immediate billing manager action
  - condition: "denied_amount > 25000"
    level: 5
    reason: High-value denial exceeds $25K — requires controller and billing manager co-review

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    claimId:
      type: string
    denialId:
      type: string
    residentId:
      type: string
    facilityId:
      type: string
  required:
    - claimId
    - denialId
outputSchema:
  type: object
  properties:
    denialCategory:
      type: string
    appealable:
      type: boolean
    appealSuccessProbability:
      type: number
    appealLetter:
      type: string
    rootCause:
      type: string

schedule: null
timeout: 5m
tags:
  - revenue-cycle
  - denials
  - appeals
  - accounts-receivable
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
