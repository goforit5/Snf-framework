id: write-off-review
name: Bad Debt Write-Off Review & Approval
version: 1.0.0
domain: financial
agentId: revenue-cycle-agent
description: >
  Reviews accounts receivable balances that have exceeded collection thresholds
  and are candidates for write-off. Pulls aging data from PCC, verifies all
  collection efforts have been exhausted (statements sent, collection calls,
  payment plan offers), checks for Medicaid pending applications, and validates
  against write-off policy thresholds. Categorizes write-offs by reason
  (uncollectible, contractual, administrative) and calculates bad debt expense
  impact. Ensures compliance with Medicare bad debt recovery rules (42 CFR 413.89).

model: sonnet
tools:
  - pcc_get_resident
  - bank_get_transactions
maxTurns: 10

trigger:
  type: schedule
  config:
    cron: "0 9 15 * *"
    description: Monthly write-off review on the 15th

steps:
  - name: fetch-aged-balances
    description: Pull AR balances exceeding 120 days with no recent payment activity
    tool: pcc.billing.getAgedBalances
    input:
      facilityId: "{{context.facilityId}}"
      minAgeDays: 120
      noPaymentDays: 60
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: fetch-collection-history
    description: Pull collection activity history for each candidate account
    tool: pcc.billing.getCollectionHistory
    input:
      accountIds: "{{steps.fetch-aged-balances.output.accountIds}}"
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: analyze-write-off-candidates
    description: >
      Evaluate each candidate against write-off policy criteria. Verify collection
      efforts meet minimum requirements. Check for pending Medicaid applications
      or active payment plans. Categorize by write-off reason and calculate
      financial impact. Identify Medicare bad debt eligible balances for cost
      report recovery.
    tool: claude.analyze
    input:
      prompt: write_off_analysis
      context:
        - "{{steps.fetch-aged-balances.output}}"
        - "{{steps.fetch-collection-history.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-decision
    description: Submit write-off recommendations to decision queue for controller approval
    tool: decision-queue.submit
    input:
      type: write-off-review
      priority: "{{steps.analyze-write-off-candidates.output.priority}}"
      report: "{{steps.analyze-write-off-candidates.output}}"
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 4
governanceOverrides:
  - condition: "individual_balance < 500 && collection_efforts_exhausted == true"
    level: 2
    reason: Small balance with exhausted collection efforts — auto-approve write-off
  - condition: "total_write_off > 50000"
    level: 5
    reason: Monthly write-off total exceeds $50K — requires CFO and administrator co-approval
  - condition: "medicare_bad_debt == true"
    level: 5
    reason: Medicare bad debt eligible — requires compliance review for cost report inclusion

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required:
    - facilityId
outputSchema:
  type: object
  properties:
    writeOffCandidates:
      type: array
    totalWriteOffAmount:
      type: number
    medicareBadDebt:
      type: number
    categoryBreakdown:
      type: object

schedule: "0 9 15 * *"
timeout: 5m
tags:
  - revenue-cycle
  - write-off
  - bad-debt
  - collections
  - medicare-cost-report
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
