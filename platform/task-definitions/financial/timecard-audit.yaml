id: timecard-audit
name: Timecard Accuracy & Compliance Audit
version: 1.0.0
domain: financial
agentId: payroll-agent
description: >
  Audits timecards before payroll processing to identify discrepancies, policy
  violations, and potential fraud. Pulls timecard data from Workday, compares
  against scheduled shifts, validates overtime authorization, checks for buddy
  punching patterns (simultaneous punches from same location), and flags missed
  meal/rest breaks per state labor law. Cross-references against PCC census to
  ensure staffing levels match billed staffing ratios. Runs every pay period
  before payroll close.

model: sonnet
tools:
  - workday_get_timecards
  - workday_get_employee
  - workday_get_positions
  - pcc_get_census
maxTurns: 10

trigger:
  type: schedule
  config:
    cron: "0 6 * * 1"
    description: Weekly timecard audit every Monday before payroll close

steps:
  - name: fetch-timecards
    description: Pull all timecards for the pay period from Workday
    tool: workday.payroll.getTimecards
    input:
      facilityId: "{{context.facilityId}}"
      payPeriod: current
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-schedules
    description: Pull scheduled shifts from Workday for comparison
    tool: workday.scheduling.getShifts
    input:
      facilityId: "{{context.facilityId}}"
      payPeriod: current
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: fetch-census-data
    description: Pull daily census counts from PCC for staffing ratio validation
    tool: pcc.census.getDaily
    input:
      facilityId: "{{context.facilityId}}"
      payPeriod: current
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: audit-timecards
    description: >
      Compare timecards against schedules to identify: unscheduled overtime,
      missed punches, early/late arrivals exceeding threshold, missed meal breaks
      (state-specific rules), buddy punching patterns, and staffing ratio
      compliance. Calculate payroll liability impact for each discrepancy.
    tool: claude.analyze
    input:
      prompt: timecard_audit_analysis
      context:
        - "{{steps.fetch-timecards.output}}"
        - "{{steps.fetch-schedules.output}}"
        - "{{steps.fetch-census-data.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-decision
    description: Submit audit findings to decision queue for payroll manager review
    tool: decision-queue.submit
    input:
      type: timecard-audit
      priority: "{{steps.audit-timecards.output.priority}}"
      report: "{{steps.audit-timecards.output}}"
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "no_discrepancies == true"
    level: 1
    reason: All timecards match schedules within tolerance — auto-approve for payroll
  - condition: "fraud_indicators == true"
    level: 6
    reason: Potential timecard fraud detected — escalate to HR and compliance immediately
  - condition: "overtime_liability > 10000"
    level: 5
    reason: Overtime liability exceeds $10K for the period — requires administrator approval
  - condition: "meal_break_violations > 10"
    level: 4
    reason: Multiple meal break violations — labor law compliance risk requires HR review

requiredConnectors:
  - workday
  - pcc
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required:
    - facilityId
outputSchema:
  type: object
  properties:
    discrepancies:
      type: array
    overtimeHours:
      type: number
    overtimeLiability:
      type: number
    mealBreakViolations:
      type: number
    staffingRatioCompliance:
      type: boolean

schedule: "0 6 * * 1"
timeout: 5m
tags:
  - payroll
  - timecard
  - labor-compliance
  - fraud-detection
  - staffing-ratios
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
