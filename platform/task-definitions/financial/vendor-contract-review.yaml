id: vendor-contract-review
name: Vendor Contract Compliance & Renewal Review
version: 1.0.0
domain: financial
agentId: procurement-agent
description: >
  Monitors vendor contracts approaching renewal or expiration. Pulls contract
  terms from the contract management system, compares actual spend and
  performance against contractual SLAs and pricing commitments, and identifies
  renegotiation opportunities. Analyzes market benchmarks for key spend
  categories (medical supplies, food service, housekeeping, therapy staffing).
  Generates renewal recommendation with negotiation leverage points. Flags
  auto-renewal clauses that require opt-out action within notice periods.

trigger:
  type: schedule
  config:
    cron: "0 8 1 * *"
    description: Monthly contract review on the 1st — 90-day lookahead for renewals

steps:
  - name: fetch-expiring-contracts
    description: Pull contracts expiring or renewing in the next 90 days
    tool: workday.contracts.getExpiring
    input:
      facilityId: "{{context.facilityId}}"
      lookaheadDays: 90
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: fetch-spend-history
    description: Pull actual spend by vendor for the contract period from Workday
    tool: workday.ap.getSpendByVendor
    input:
      vendorIds: "{{steps.fetch-expiring-contracts.output.vendorIds}}"
      period: contract_term
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: analyze-contracts
    description: >
      Compare actual spend against contractual commitments. Identify under- or
      over-utilization. Check SLA compliance. Calculate cost per unit trends.
      Identify auto-renewal opt-out deadlines. Generate renegotiation
      recommendations with market benchmark comparisons.
    tool: claude.analyze
    input:
      prompt: vendor_contract_analysis
      context:
        - "{{steps.fetch-expiring-contracts.output}}"
        - "{{steps.fetch-spend-history.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-decision
    description: Submit contract review findings to decision queue for procurement/administrator review
    tool: decision-queue.submit
    input:
      type: vendor-contract-review
      priority: "{{steps.analyze-contracts.output.priority}}"
      report: "{{steps.analyze-contracts.output}}"
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 4
governanceOverrides:
  - condition: "annual_value < 10000 && performance_satisfactory == true"
    level: 2
    reason: Low-value contract with satisfactory performance — auto-renew with notification
  - condition: "annual_value > 100000"
    level: 5
    reason: High-value contract exceeds $100K — requires administrator and regional procurement review
  - condition: "auto_renewal_deadline_days <= 15"
    level: 5
    reason: Auto-renewal opt-out deadline imminent — requires immediate action

requiredConnectors:
  - workday
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required:
    - facilityId
outputSchema:
  type: object
  properties:
    expiringContracts:
      type: array
    renewalRecommendations:
      type: array
    renegotiationOpportunities:
      type: array
    totalAnnualValue:
      type: number

schedule: "0 8 1 * *"
timeout: 5m
tags:
  - procurement
  - contracts
  - vendor-management
  - cost-optimization
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
