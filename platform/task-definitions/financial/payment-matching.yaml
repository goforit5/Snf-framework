id: payment-matching
name: Payment & Remittance Matching
version: 1.0.0
domain: financial
agentId: revenue-cycle-agent
description: >
  Matches incoming payments (ERA/EOBs from Medicare, Medicaid, managed care, and
  private payers) against outstanding accounts receivable in PCC billing. Parses
  835 remittance files and bank deposit data to reconcile payments to specific
  claims and residents. Identifies short-pays, denials, contractual adjustments,
  and unallocated payments. Flags payment variances exceeding expected contractual
  allowances. Ensures timely posting to minimize AR days and maintain accurate
  facility financials.

model: haiku
tools:
  - pcc_get_resident
  - bank_get_transactions
  - bank_get_balances
maxTurns: 8

trigger:
  type: event
  config:
    event: payment.received
    filter: "payment_type in ['era', 'eob', 'eft', 'check']"

steps:
  - name: parse-remittance
    description: Parse 835 ERA file or EOB document to extract payment details by claim
    tool: claude.analyze
    input:
      prompt: remittance_parsing
      document: "{{event.remittanceData}}"
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: match-claims
    description: Match parsed payment lines against outstanding AR claims in PCC
    tool: pcc.billing.matchPayments
    input:
      payerCode: "{{steps.parse-remittance.output.payerCode}}"
      claimLines: "{{steps.parse-remittance.output.claimLines}}"
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: calculate-variances
    description: Compare paid amounts against expected contractual rates for each claim
    tool: pcc.billing.calculateVariance
    input:
      matchedClaims: "{{steps.match-claims.output.matched}}"
      payerCode: "{{steps.parse-remittance.output.payerCode}}"
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: submit-decision
    description: Submit payment matching results to decision queue for billing team review
    tool: decision-queue.submit
    input:
      type: payment-matching
      priority: "{{steps.calculate-variances.output.priority}}"
      report:
        matched: "{{steps.match-claims.output.matched}}"
        unmatched: "{{steps.match-claims.output.unmatched}}"
        variances: "{{steps.calculate-variances.output}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 2
governanceOverrides:
  - condition: "all_matched == true && variance_pct < 0.02"
    level: 1
    reason: All payments matched within 2% variance — auto-post to AR
  - condition: "unmatched_amount > 10000"
    level: 4
    reason: Unmatched payment exceeds $10K — requires AR manager investigation
  - condition: "denial_count > 5"
    level: 4
    reason: Multiple denials in single remittance — requires billing team root cause analysis

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    remittanceData:
      type: string
    facilityId:
      type: string
  required:
    - remittanceData
outputSchema:
  type: object
  properties:
    totalPayment:
      type: number
    matchedAmount:
      type: number
    unmatchedAmount:
      type: number
    denials:
      type: array
    variances:
      type: array

schedule: null
timeout: 3m
tags:
  - revenue-cycle
  - accounts-receivable
  - payment-posting
  - remittance
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
