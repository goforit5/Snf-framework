id: insurance-authorization
name: Insurance Prior Authorization Management
version: 1.0.0
domain: admissions
agentId: authorization-agent
description: >
  Manages the prior authorization process for managed care and commercial
  insurance admissions. Pulls clinical documentation from PCC, compiles the
  authorization request with medical necessity justification, submits to the
  payer electronically or via fax, tracks authorization status, manages
  concurrent review re-authorizations during the stay, and alerts when
  authorized days are approaching expiration. Denied authorizations trigger
  appeal workflows with clinical documentation packages. Authorization delays
  are the #1 cause of claim denials in managed care SNF admissions — each
  denied day is $400-800 in lost revenue.

trigger:
  type: event
  config:
    event: authorization.required
    filter: "type in ['initial', 'concurrent', 'retro']"

steps:
  - name: fetch-clinical-documentation
    description: Pull clinical documentation supporting medical necessity from PCC
    tool: pcc.clinical.getDocumentation
    input:
      residentId: "{{event.residentId}}"
      facilityId: "{{event.facilityId}}"
      documentTypes:
        - history_and_physical
        - physician_orders
        - therapy_evaluation
        - nursing_assessment
        - care_plan
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-payer-requirements
    description: Pull payer-specific authorization requirements and submission method
    tool: payer.authorization.getRequirements
    input:
      payerId: "{{event.payerId}}"
      serviceType: skilled_nursing
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: generate-auth-request
    description: >
      Compile authorization request with medical necessity narrative, clinical
      documentation, and projected length of stay based on diagnosis and functional status.
    tool: claude.generate
    input:
      template: prior_authorization_request
      data:
        clinical: "{{steps.fetch-clinical-documentation.output}}"
        payerRequirements: "{{steps.fetch-payer-requirements.output}}"
        authType: "{{event.type}}"
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: submit-decision
    description: Submit authorization request to decision queue for clinical review before submission to payer
    tool: decision-queue.submit
    input:
      type: insurance-authorization
      priority: high
      authRequest: "{{steps.generate-auth-request.output}}"
      residentId: "{{event.residentId}}"
      facilityId: "{{event.facilityId}}"
      payerId: "{{event.payerId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 4
governanceOverrides:
  - condition: "auth_type == 'concurrent' && days_remaining > 3"
    level: 3
    reason: Concurrent review with days remaining — route to MDS coordinator for submission
  - condition: "auth_type == 'initial' && admission_within_24_hours == true"
    level: 5
    reason: Initial auth needed urgently — escalate for immediate clinical review and submission
  - condition: "authorization_denied == true"
    level: 5
    reason: Authorization denied — escalate to business office for appeal with enhanced clinical documentation

requiredConnectors:
  - pcc
  - payer
inputSchema:
  type: object
  properties:
    residentId:
      type: string
    facilityId:
      type: string
    payerId:
      type: string
    type:
      type: string
      enum:
        - initial
        - concurrent
        - retro
  required:
    - residentId
    - facilityId
    - payerId
outputSchema:
  type: object
  properties:
    authorizationId:
      type: string
    status:
      type: string
      enum:
        - pending
        - approved
        - denied
        - appealed
    authorizedDays:
      type: integer
    expirationDate:
      type: string
      format: date
    medicalNecessityNarrative:
      type: string

schedule: null
timeout: 5m
tags:
  - authorization
  - prior-auth
  - managed-care
  - admissions
  - revenue
  - denial-prevention
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
