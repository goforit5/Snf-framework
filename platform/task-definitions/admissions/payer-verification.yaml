id: payer-verification
name: Payer Eligibility Verification
version: 1.0.0
domain: admissions
agentId: admissions-agent
description: >
  Verifies insurance eligibility and benefits for incoming admissions. Performs
  real-time eligibility checks against Medicare (CWF/HETS), Medicaid (state EVS),
  and commercial payers. Confirms Medicare Part A SNF benefit days remaining,
  prior hospital qualifying stay (3-midnight rule), Medicaid eligibility status,
  managed care plan authorization requirements, and secondary/supplemental
  coverage. Identifies payer issues before admission to prevent denials and
  unbillable days. A single missed eligibility verification can result in
  $15K-50K in unrecoverable revenue depending on length of stay.

trigger:
  type: event
  config:
    event: admission.scheduled
    filter: "status == 'pending_verification'"

steps:
  - name: fetch-patient-insurance
    description: Pull patient insurance information from referral packet and PCC
    tool: pcc.insurance.get
    input:
      residentId: "{{event.residentId}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: verify-medicare-eligibility
    description: Check Medicare eligibility, benefit days remaining, and qualifying hospital stay
    tool: payer.medicare.verifyEligibility
    input:
      medicareId: "{{steps.fetch-patient-insurance.output.medicareId}}"
      admissionDate: "{{event.admissionDate}}"
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: verify-secondary-coverage
    description: Verify secondary/supplemental insurance coverage and benefits
    tool: payer.eligibility.verify
    input:
      insuranceInfo: "{{steps.fetch-patient-insurance.output.secondaryInsurance}}"
      serviceType: skilled_nursing
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: check-prior-auth
    description: Determine if prior authorization is required and initiate if needed
    tool: payer.authorization.check
    input:
      payerId: "{{steps.fetch-patient-insurance.output.primaryPayerId}}"
      serviceType: skilled_nursing
      diagnosisCodes: "{{event.diagnosisCodes}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: submit-decision
    description: Submit verification results to decision queue for admissions/billing coordinator
    tool: decision-queue.submit
    input:
      type: payer-verification
      priority: "{{steps.verify-medicare-eligibility.output.priority}}"
      verification:
        medicare: "{{steps.verify-medicare-eligibility.output}}"
        secondary: "{{steps.verify-secondary-coverage.output}}"
        priorAuth: "{{steps.check-prior-auth.output}}"
      residentId: "{{event.residentId}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "medicare_eligible == true && benefit_days > 20 && qualifying_stay_confirmed == true"
    level: 2
    reason: Medicare eligible with ample benefit days and qualifying stay — auto-verify
  - condition: "qualifying_stay_not_confirmed == true"
    level: 5
    reason: 3-midnight qualifying hospital stay not confirmed — high denial risk, requires business office review
  - condition: "no_coverage_found == true"
    level: 5
    reason: No insurance coverage verified — escalate to administrator for self-pay/charity decision
  - condition: "prior_auth_required == true"
    level: 4
    reason: Prior authorization required — initiate auth process, do not admit until approved

requiredConnectors:
  - pcc
  - payer
inputSchema:
  type: object
  properties:
    residentId:
      type: string
    facilityId:
      type: string
    admissionDate:
      type: string
      format: date
  required:
    - residentId
    - facilityId
outputSchema:
  type: object
  properties:
    medicareEligible:
      type: boolean
    benefitDaysRemaining:
      type: integer
    qualifyingStayConfirmed:
      type: boolean
    secondaryCoverage:
      type: object
    priorAuthStatus:
      type: string
      enum:
        - not_required
        - required_pending
        - approved
        - denied

schedule: null
timeout: 3m
tags:
  - payer
  - eligibility
  - medicare
  - admissions
  - revenue
  - denial-prevention
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
