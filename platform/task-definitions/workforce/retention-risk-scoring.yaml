id: retention-risk-scoring
name: Employee Retention Risk Scoring
version: 1.0.0
domain: workforce
agentId: workforce-analytics-agent
description: >
  Calculates retention risk scores for all active employees using a multi-factor
  model that considers tenure, overtime frequency, call-off patterns, schedule
  satisfaction surveys, pay rate vs. market benchmarks, commute distance,
  disciplinary actions, and peer turnover rates. Nursing staff turnover in SNFs
  averages 50-75% annually — each RN turnover costs $40K-$60K in recruiting,
  training, and agency backfill. Early identification of flight risks enables
  targeted retention interventions (schedule adjustment, pay increase, role change).

model: sonnet
tools:
  - workday_get_employee
  - workday_search_employees
  - workday_get_timecards
  - workday_get_payroll
  - workday_get_positions
maxTurns: 10

trigger:
  type: schedule
  config:
    cron: "0 5 1,15 * *"
    timezone: America/Chicago

steps:
  - name: fetch-employee-data
    description: Pull employee profiles, tenure, pay rates, and disciplinary records from Workday
    tool: workday.hr.getEmployeeAnalytics
    input:
      fields:
        - tenure
        - payRate
        - discipline
        - performanceReviews
        - promotionHistory
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: fetch-attendance-patterns
    description: Pull call-off, tardiness, and overtime patterns from time and scheduling systems
    tool: workday.time.getAttendancePatterns
    input:
      lookbackDays: 90
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-market-benchmarks
    description: Pull local market pay rate benchmarks for comparison
    tool: workday.compensation.getMarketData
    input:
      roles:
        - RN
        - LPN
        - CNA
        - RT
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: calculate-risk-scores
    description: >
      Score each employee on retention risk using weighted factors. Flag employees
      scoring above threshold for proactive intervention. Identify facility-level
      patterns that indicate systemic retention issues.
    tool: claude.analyze
    input:
      prompt: retention_risk_scoring_model
      context:
        - "{{steps.fetch-employee-data.output}}"
        - "{{steps.fetch-attendance-patterns.output}}"
        - "{{steps.fetch-market-benchmarks.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-decision
    description: Submit retention risk report to decision queue for HR director/administrator review
    tool: decision-queue.submit
    input:
      type: retention-risk-scoring
      priority: "{{steps.calculate-risk-scores.output.priority}}"
      riskReport: "{{steps.calculate-risk-scores.output}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "high_risk_count == 0"
    level: 2
    reason: No high-risk employees identified — auto-file report
  - condition: "high_risk_count > 5 && role == 'RN'"
    level: 4
    reason: Multiple high-risk RNs identified — requires HR director intervention
  - condition: "facility_turnover_rate > 0.60"
    level: 5
    reason: Facility turnover rate exceeds 60% annualized — escalate to regional VP

requiredConnectors:
  - workday
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required: []
outputSchema:
  type: object
  properties:
    riskScores:
      type: array
    highRiskCount:
      type: integer
    facilitySummary:
      type: object
    interventionRecommendations:
      type: array

schedule: "0 5 1,15 * *"
timeout: 5m
tags:
  - retention
  - turnover
  - workforce-analytics
  - hr
  - cost-avoidance
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
