id: credential-renewal
name: Credential Renewal Processing
version: 1.0.0
domain: workforce
agentId: credentialing-agent
description: >
  Processes credential renewal submissions from employees. When an employee
  submits updated license, certification, or health clearance documentation,
  the agent validates the document (expiration date, issuing authority, employee
  name match), updates Workday HR records, verifies against the state licensing
  board, and clears any pending schedule holds. Ensures continuity of
  credentialing without manual HR data entry. Integrates with the license-expiry-check
  task to clear renewal alerts once processed.

trigger:
  type: event
  config:
    event: credential.submitted
    filter: "type in ['license', 'certification', 'health_clearance']"

steps:
  - name: fetch-submission
    description: Pull the submitted credential document and metadata
    tool: workday.hr.getCredentialSubmission
    input:
      submissionId: "{{event.submissionId}}"
      employeeId: "{{event.employeeId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: validate-document
    description: Extract and validate key fields from submitted credential document using AI
    tool: claude.analyze
    input:
      prompt: credential_document_validation
      document: "{{steps.fetch-submission.output.documentUrl}}"
      context:
        - "{{steps.fetch-submission.output}}"
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: verify-licensing-board
    description: Cross-reference license number and expiry against state licensing board
    tool: licensing.verify
    input:
      licenseNumber: "{{steps.validate-document.output.licenseNumber}}"
      state: "{{steps.validate-document.output.issuingState}}"
      licenseType: "{{steps.validate-document.output.credentialType}}"
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: submit-decision
    description: Submit validated renewal to decision queue for HR credential specialist
    tool: decision-queue.submit
    input:
      type: credential-renewal
      priority: "{{steps.validate-document.output.priority}}"
      validation: "{{steps.validate-document.output}}"
      boardVerification: "{{steps.verify-licensing-board.output}}"
      employeeId: "{{event.employeeId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "document_valid == true && board_verified == true"
    level: 2
    reason: Document validated and board-verified — auto-update Workday and clear holds
  - condition: "name_mismatch == true"
    level: 4
    reason: Name on credential does not match employee record — requires HR review
  - condition: "board_verification_failed == true"
    level: 5
    reason: State board verification failed — hold employee from schedule, escalate to HR director

requiredConnectors:
  - workday
inputSchema:
  type: object
  properties:
    submissionId:
      type: string
    employeeId:
      type: string
  required:
    - submissionId
    - employeeId
outputSchema:
  type: object
  properties:
    validationResult:
      type: string
      enum:
        - valid
        - invalid
        - needs_review
    boardVerified:
      type: boolean
    updatedExpiry:
      type: string
      format: date

schedule: null
timeout: 3m
tags:
  - credentialing
  - renewal
  - license
  - compliance
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
