id: call-off-processing
name: Call-Off Processing & Replacement Staffing
version: 1.0.0
domain: workforce
agentId: scheduling-agent
description: >
  Processes employee call-offs in real time. When a staff member calls off,
  the agent immediately evaluates the impact on staffing ratios, identifies
  qualified replacements based on credentials, availability, overtime status,
  and proximity, sends automated outreach (text/call) to available staff,
  and escalates to agency staffing if internal replacements are not secured
  within the configured time window. Maintains PBJ compliance throughout.

model: sonnet
tools:
  - workday_get_employee
  - workday_get_positions
  - workday_get_timecards
  - pcc_get_census
  - m365_send_email
maxTurns: 10

trigger:
  type: event
  config:
    event: staffing.callOff
    filter: "status == 'confirmed'"

steps:
  - name: assess-impact
    description: Evaluate staffing ratio impact of the call-off against current schedule and census
    tool: workday.scheduling.assessImpact
    input:
      facilityId: "{{event.facilityId}}"
      shiftId: "{{event.shiftId}}"
      employeeId: "{{event.employeeId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: find-replacements
    description: Search for qualified available staff based on credentials, availability, and OT status
    tool: workday.scheduling.findReplacements
    input:
      facilityId: "{{event.facilityId}}"
      shiftId: "{{event.shiftId}}"
      credentialType: "{{event.credentialType}}"
      maxOvertimeHours: 16
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: send-outreach
    description: Send automated text/call outreach to top-ranked available replacement candidates
    tool: communications.sendBatch
    input:
      recipients: "{{steps.find-replacements.output.candidates}}"
      template: shift_replacement_offer
      shiftDetails: "{{event}}"
      responseDeadlineMinutes: 30
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: submit-decision
    description: Submit call-off and replacement status to decision queue for staffing coordinator review
    tool: decision-queue.submit
    input:
      type: call-off-processing
      priority: "{{steps.assess-impact.output.priority}}"
      impact: "{{steps.assess-impact.output}}"
      candidates: "{{steps.find-replacements.output}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "replacement_confirmed == true && ratio_maintained == true"
    level: 2
    reason: Replacement secured and staffing ratios maintained — auto-approve with notification
  - condition: "no_replacements_available == true"
    level: 5
    reason: No internal replacements available — escalate for agency staffing authorization
  - condition: "below_state_minimum == true"
    level: 6
    reason: Call-off puts facility below state minimum ratios — immediate administrator action required

requiredConnectors:
  - workday
  - pcc
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
    shiftId:
      type: string
    employeeId:
      type: string
    credentialType:
      type: string
  required:
    - facilityId
    - shiftId
    - employeeId
outputSchema:
  type: object
  properties:
    impactAssessment:
      type: object
    replacementCandidates:
      type: array
    outreachStatus:
      type: string
    ratioCompliance:
      type: boolean

schedule: null
timeout: 5m
tags:
  - staffing
  - call-off
  - replacement
  - pbj
  - real-time
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
