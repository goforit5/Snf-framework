id: contract-renewal-tracking
name: Contract Renewal Tracking & Alert System
version: 1.0.0
domain: legal
agentId: legal-ops-agent
description: >
  Monitors all active contracts for upcoming renewal dates, auto-renewal
  deadlines, and termination notice windows. Covers vendor contracts, managed
  care agreements, physician service agreements, staffing agency contracts,
  lease agreements, and technology licenses. Pulls contract metadata from the
  contract management system, identifies contracts approaching renewal within
  90/60/30-day windows, flags auto-renewal clauses requiring opt-out action,
  and assembles renewal packages with performance data for renegotiation.
  A missed termination notice window on a bad contract can lock the facility
  into unfavorable terms for another 1-3 years.

model: sonnet
tools:
  - workday_get_employee
  - m365_search_sharepoint
  - m365_get_sharepoint_file
  - m365_send_email
maxTurns: 8

trigger:
  type: schedule
  config:
    cron: "0 7 * * 1"
    timezone: America/Chicago

steps:
  - name: fetch-active-contracts
    description: Pull all active contracts with renewal dates, notice periods, and auto-renewal clauses
    tool: clm.contracts.getActive
    input:
      includeRenewalTerms: true
      expiringWithinDays: 120
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-vendor-performance
    description: Pull vendor performance metrics for contracts approaching renewal
    tool: workday.vendors.getPerformance
    input:
      vendorIds: "{{steps.fetch-active-contracts.output.expiringVendorIds}}"
      lookbackMonths: 12
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: analyze-renewals
    description: >
      Prioritize renewals by deadline urgency, identify auto-renewal opt-out windows,
      flag underperforming vendors for renegotiation, and calculate financial impact
      of each contract.
    tool: claude.analyze
    input:
      prompt: contract_renewal_analysis
      context:
        - "{{steps.fetch-active-contracts.output}}"
        - "{{steps.fetch-vendor-performance.output}}"
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: submit-decision
    description: Submit renewal tracker to decision queue for legal/procurement review
    tool: decision-queue.submit
    input:
      type: contract-renewal-tracking
      priority: "{{steps.analyze-renewals.output.priority}}"
      renewalReport: "{{steps.analyze-renewals.output}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "no_renewals_within_60_days == true"
    level: 2
    reason: No imminent renewals — auto-file weekly summary
  - condition: "auto_renewal_opt_out_within_14_days == true"
    level: 5
    reason: Auto-renewal opt-out deadline within 14 days — requires immediate legal review
  - condition: "annual_contract_value > 100000"
    level: 4
    reason: High-value contract renewal — requires VP/controller approval for renewal terms

requiredConnectors:
  - clm
  - workday
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required: []
outputSchema:
  type: object
  properties:
    upcomingRenewals:
      type: array
    autoRenewalAlerts:
      type: array
    renegotiationCandidates:
      type: array
    totalContractValue:
      type: number

schedule: "0 7 * * 1"
timeout: 3m
tags:
  - contracts
  - legal
  - procurement
  - renewal
  - auto-renewal
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
