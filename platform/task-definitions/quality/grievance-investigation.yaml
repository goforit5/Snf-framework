id: grievance-investigation
name: Grievance Investigation Tracking
version: 1.0.0
domain: quality
agentId: quality-analytics-agent
description: >
  Tracks and manages resident/family grievance investigations from filing through
  resolution. When a grievance is filed, the agent categorizes it (care quality,
  staff behavior, dietary, environment, personal property, rights violation),
  assigns an investigator based on category, sets regulatory response deadlines,
  collects evidence from relevant systems (PCC clinical records, incident reports,
  staff schedules), and monitors investigation progress. CMS F-tag F585 requires
  facilities to establish a grievance process with timely investigation and
  written response. Unresolved grievances are a top survey deficiency trigger
  and can result in state complaints.

model: sonnet
tools:
  - pcc_get_resident
  - pcc_get_incidents
  - pcc_get_care_plan
  - pcc_get_assessments
  - workday_get_employee
maxTurns: 10

trigger:
  type: event
  config:
    event: grievance.filed
    filter: "status == 'new'"

steps:
  - name: fetch-grievance-details
    description: Pull grievance filing details, complainant information, and category
    tool: pcc.grievances.get
    input:
      grievanceId: "{{event.grievanceId}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: gather-evidence
    description: Pull related records from PCC (clinical notes, incident reports, care plans) for investigation
    tool: pcc.records.search
    input:
      residentId: "{{event.residentId}}"
      dateRange: "{{event.dateRange}}"
      categories:
        - clinical_notes
        - incident_reports
        - care_plans
        - staff_assignments
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: analyze-grievance
    description: >
      Categorize grievance, assess severity, check for patterns with prior grievances,
      identify regulatory reporting requirements, and recommend investigation steps.
    tool: claude.analyze
    input:
      prompt: grievance_investigation_analysis
      context:
        - "{{steps.fetch-grievance-details.output}}"
        - "{{steps.gather-evidence.output}}"
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: submit-decision
    description: Submit grievance investigation plan to decision queue for social worker/administrator
    tool: decision-queue.submit
    input:
      type: grievance-investigation
      priority: "{{steps.analyze-grievance.output.priority}}"
      investigation: "{{steps.analyze-grievance.output}}"
      grievanceId: "{{event.grievanceId}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 4
governanceOverrides:
  - condition: "category == 'dietary' && severity == 'low'"
    level: 3
    reason: Low-severity dietary grievance — route to dietary manager for standard investigation
  - condition: "category == 'abuse_allegation'"
    level: 6
    reason: Abuse allegation — mandatory immediate investigation, state reporting, and administrator notification
  - condition: "repeat_grievance == true"
    level: 5
    reason: Repeat grievance on same issue — escalate to administrator, prior resolution was inadequate

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    grievanceId:
      type: string
    facilityId:
      type: string
    residentId:
      type: string
  required:
    - grievanceId
    - facilityId
outputSchema:
  type: object
  properties:
    category:
      type: string
    severity:
      type: string
    investigationPlan:
      type: object
    regulatoryDeadline:
      type: string
      format: date
    assignedInvestigator:
      type: string

schedule: null
timeout: 3m
tags:
  - grievance
  - investigation
  - resident-rights
  - f585
  - cms-required
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
