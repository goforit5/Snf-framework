id: survey-readiness-check
name: State Survey Readiness Assessment
version: 1.0.0
domain: quality
agentId: survey-readiness-agent
description: >
  Conducts continuous survey readiness assessments to ensure the facility is
  prepared for unannounced CMS/state health department surveys. Reviews the top
  10 most-cited F-tags (infection control F880, abuse prevention F600, quality
  of care F684, medication management F756, dignity F550, resident rights),
  checks compliance with Phase 3 Requirements of Participation, verifies all
  required postings are current, confirms complaint investigation files are
  complete, and assesses MDS coding accuracy. Facilities are surveyed every
  9-15 months — perpetual readiness is the only strategy.

model: sonnet
tools:
  - cms_get_survey_results
  - cms_get_facility_quality
  - cms_get_penalties
  - pcc_get_census
  - pcc_get_incidents
maxTurns: 10

trigger:
  type: schedule
  config:
    cron: "0 6 * * 1"
    timezone: facility_local

steps:
  - name: fetch-last-survey
    description: Pull most recent survey results, deficiencies, and plan of correction status
    tool: cms.surveys.getLatest
    input:
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-complaint-status
    description: Pull open complaint investigations and resolution status
    tool: pcc.complaints.getOpen
    input:
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: check-required-postings
    description: Verify all CMS-required facility postings are current (survey results, ombudsman info, rights)
    tool: compliance.postings.verify
    input:
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: assess-readiness
    description: >
      Score facility across top-cited F-tag categories, identify areas of
      vulnerability, check plan of correction compliance from last survey,
      and generate a prioritized remediation list.
    tool: claude.analyze
    input:
      prompt: survey_readiness_assessment
      context:
        - "{{steps.fetch-last-survey.output}}"
        - "{{steps.fetch-complaint-status.output}}"
        - "{{steps.check-required-postings.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-decision
    description: Submit survey readiness report to decision queue for administrator/QAPI review
    tool: decision-queue.submit
    input:
      type: survey-readiness-check
      priority: "{{steps.assess-readiness.output.priority}}"
      readinessReport: "{{steps.assess-readiness.output}}"
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "readiness_score >= 90 && no_open_pocs == true"
    level: 2
    reason: High readiness score with no open plans of correction — auto-file with notification
  - condition: "months_since_last_survey > 12"
    level: 4
    reason: Over 12 months since last survey — heightened readiness posture required
  - condition: "immediate_jeopardy_risk_area == true"
    level: 5
    reason: Area identified with Immediate Jeopardy risk — escalate to administrator for remediation

requiredConnectors:
  - pcc
  - cms
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required:
    - facilityId
outputSchema:
  type: object
  properties:
    readinessScore:
      type: number
    vulnerabilities:
      type: array
    pocStatus:
      type: object
    monthsSinceLastSurvey:
      type: integer

schedule: "0 6 * * 1"
timeout: 5m
tags:
  - survey
  - readiness
  - compliance
  - cms-required
  - qapi
  - f-tags
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
