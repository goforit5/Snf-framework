id: acquisition-screening
name: Acquisition Target Screening & Due Diligence
version: 1.0.0
domain: strategic
agentId: ma-agent
description: >
  Screens potential acquisition targets for Ensign's M&A pipeline. When a
  potential target is identified (facility for sale, distressed operator, market
  expansion opportunity), the agent pulls CMS data (star ratings, survey history,
  staffing, quality measures), financial estimates (bed count, occupancy, payer
  mix, state Medicaid rates), market analysis (competition density, referral
  sources, population demographics), and regulatory risk profile (recent IJs,
  CMPs, state complaints). Generates a preliminary due diligence scorecard that
  determines whether to advance to full diligence. Ensign has acquired 330+
  facilities — speed and rigor in screening creates competitive advantage.

model: opus
tools:
  - cms_get_facility_quality
  - cms_get_survey_results
  - cms_get_penalties
  - oig_exclusion_check
  - sam_debarment_check
maxTurns: 15

trigger:
  type: event
  config:
    event: acquisition.targetIdentified
    filter: "status == 'screening'"

steps:
  - name: fetch-cms-profile
    description: Pull CMS Care Compare profile including ratings, survey history, and penalties
    tool: cms.careCompare.getFacility
    input:
      cmsId: "{{event.cmsCertificationNumber}}"
      includeHistory: true
      historyYears: 3
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-financial-estimates
    description: Pull publicly available financial data and state Medicaid rate information
    tool: cms.costReports.get
    input:
      cmsId: "{{event.cmsCertificationNumber}}"
      years: 3
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: analyze-market
    description: Analyze local market demographics, competition, and referral source landscape
    tool: market.demographics.analyze
    input:
      latitude: "{{event.latitude}}"
      longitude: "{{event.longitude}}"
      radiusMiles: 15
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: screen-regulatory-risk
    description: Check for enforcement actions, CMPs, state sanctions, and litigation history
    tool: regulatory.enforcement.check
    input:
      facilityName: "{{event.facilityName}}"
      state: "{{event.state}}"
      cmsId: "{{event.cmsCertificationNumber}}"
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: generate-scorecard
    description: >
      Generate preliminary due diligence scorecard scoring the target across
      clinical quality, financial viability, market attractiveness, regulatory risk,
      and strategic fit with Ensign's portfolio.
    tool: claude.analyze
    input:
      prompt: acquisition_screening_scorecard
      context:
        - "{{steps.fetch-cms-profile.output}}"
        - "{{steps.fetch-financial-estimates.output}}"
        - "{{steps.analyze-market.output}}"
        - "{{steps.screen-regulatory-risk.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-decision
    description: Submit acquisition screening scorecard to decision queue for M&A committee
    tool: decision-queue.submit
    input:
      type: acquisition-screening
      priority: "{{steps.generate-scorecard.output.priority}}"
      scorecard: "{{steps.generate-scorecard.output}}"
      targetName: "{{event.facilityName}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 4
governanceOverrides:
  - condition: "overall_score >= 80 && no_regulatory_red_flags == true"
    level: 3
    reason: High-scoring target with clean regulatory profile — advance to full due diligence
  - condition: "immediate_jeopardy_history == true"
    level: 5
    reason: Target has Immediate Jeopardy history — requires CEO and legal review before advancing
  - condition: "estimated_deal_value > 20000000"
    level: 5
    reason: Deal value exceeds $20M — requires board-level approval to advance

requiredConnectors:
  - cms
  - market
  - regulatory
inputSchema:
  type: object
  properties:
    cmsCertificationNumber:
      type: string
    facilityName:
      type: string
    state:
      type: string
    latitude:
      type: number
    longitude:
      type: number
  required:
    - cmsCertificationNumber
    - facilityName
    - state
outputSchema:
  type: object
  properties:
    overallScore:
      type: number
    clinicalScore:
      type: number
    financialScore:
      type: number
    marketScore:
      type: number
    regulatoryRisk:
      type: string
    recommendation:
      type: string
      enum:
        - advance
        - hold
        - pass

schedule: null
timeout: 5m
tags:
  - ma
  - acquisition
  - due-diligence
  - strategy
  - screening
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
