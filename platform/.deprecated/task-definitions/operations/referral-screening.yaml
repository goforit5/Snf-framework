id: referral-screening
name: Incoming Referral Operational Screening
version: 1.0.0
domain: operations
agentId: admissions-ops-agent
description: >
  Screens incoming hospital referrals for operational readiness. Before the
  admissions team evaluates clinical appropriateness, this task verifies the
  facility can operationally support the admission: bed availability, required
  equipment (bariatric bed, wound vac, ventilator), staffing credentials for
  specialized care, isolation room availability if needed, and dietary
  accommodation capability. Fast turnaround on referral screening is critical —
  hospitals expect responses within 1-2 hours, and slow facilities lose referrals
  to competitors.

model: sonnet
tools:
  - pcc_get_census
  - pcc_get_resident
  - workday_get_employee
  - workday_get_positions
maxTurns: 8

trigger:
  type: event
  config:
    event: referral.received
    filter: "status == 'pending'"

steps:
  - name: fetch-referral-details
    description: Pull referral details including diagnosis, care requirements, and equipment needs
    tool: pcc.referrals.get
    input:
      referralId: "{{event.referralId}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: check-bed-availability
    description: Check available beds matching patient requirements (private, semi-private, isolation)
    tool: pcc.census.getAvailableBeds
    input:
      facilityId: "{{event.facilityId}}"
      requirements: "{{steps.fetch-referral-details.output.roomRequirements}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: check-equipment-availability
    description: Verify required specialized equipment is available at the facility
    tool: inventory.checkEquipment
    input:
      facilityId: "{{event.facilityId}}"
      equipmentNeeded: "{{steps.fetch-referral-details.output.equipmentRequirements}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: check-staffing-capability
    description: Verify facility has staff with required credentials for specialized care needs
    tool: workday.scheduling.checkCapability
    input:
      facilityId: "{{event.facilityId}}"
      credentialsNeeded: "{{steps.fetch-referral-details.output.careCredentials}}"
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: submit-decision
    description: Submit operational screening results to decision queue for admissions coordinator
    tool: decision-queue.submit
    input:
      type: referral-screening
      priority: high
      referralDetails: "{{steps.fetch-referral-details.output}}"
      operationalReadiness:
        bedAvailable: "{{steps.check-bed-availability.output}}"
        equipmentAvailable: "{{steps.check-equipment-availability.output}}"
        staffingCapable: "{{steps.check-staffing-capability.output}}"
      facilityId: "{{event.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "all_operational_checks_pass == true"
    level: 2
    reason: Facility operationally ready — auto-advance to clinical screening
  - condition: "bed_available == false"
    level: 4
    reason: No suitable bed available — requires admissions director to evaluate waitlist or transfer options
  - condition: "specialized_equipment_unavailable == true"
    level: 4
    reason: Required equipment not available — evaluate procurement timeline or refer to sister facility

requiredConnectors:
  - pcc
  - workday
  - inventory
inputSchema:
  type: object
  properties:
    referralId:
      type: string
    facilityId:
      type: string
  required:
    - referralId
    - facilityId
outputSchema:
  type: object
  properties:
    operationallyReady:
      type: boolean
    bedStatus:
      type: object
    equipmentStatus:
      type: object
    staffingStatus:
      type: object
    responseTime:
      type: string

schedule: null
timeout: 3m
tags:
  - referral
  - admissions
  - operations
  - census
  - time-sensitive
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
