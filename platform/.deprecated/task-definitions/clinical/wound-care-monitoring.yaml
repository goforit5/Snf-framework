id: wound-care-monitoring
name: Wound Care Assessment & Healing Tracker
version: 1.0.0
domain: clinical
agentId: clinical-safety-agent
description: >
  Monitors pressure ulcer and wound status for all residents with active wound
  care orders. Pulls wound assessment data from PCC (staging, measurements,
  wound bed description, drainage, periwound condition), tracks healing
  trajectory against expected timelines, and flags non-healing or deteriorating
  wounds for clinical intervention. CMS F-tag F686 requires facilities to
  ensure residents with pressure ulcers receive necessary treatment. Integrates
  Braden Scale scores to identify at-risk residents before wounds develop.

model: sonnet
tools:
  - pcc_get_assessments
  - pcc_get_vitals
  - pcc_get_orders
  - pcc_get_care_plan
maxTurns: 10

trigger:
  type: schedule
  config:
    cron: "0 6 * * *"
    description: Daily morning wound review for all active wound cases

steps:
  - name: fetch-active-wounds
    description: Pull all residents with active wound care orders from PCC
    tool: pcc.wounds.listActive
    input:
      facilityId: "{{context.facilityId}}"
      status: active
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-wound-assessments
    description: Retrieve wound assessment history for each active wound (last 30 days)
    tool: pcc.wounds.getAssessments
    input:
      woundIds: "{{steps.fetch-active-wounds.output.woundIds}}"
      lookbackDays: 30
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-braden-scores
    description: Pull most recent Braden Scale assessments for at-risk identification
    tool: pcc.assessments.list
    input:
      facilityId: "{{context.facilityId}}"
      assessmentType: braden_scale
      lookbackDays: 7
    onSuccess: null
    onFailure: null
    timeout: 20s

  - name: analyze-healing-trajectory
    description: >
      Compare wound measurements over time to identify healing, stalled, or
      deteriorating trajectories. Flag wounds not showing improvement within
      expected timeframes (2-4 weeks for Stage II, 6-12 weeks for Stage III).
      Identify residents with Braden scores below 18 who do not yet have
      pressure ulcer prevention protocols.
    tool: claude.analyze
    input:
      prompt: wound_healing_analysis
      context:
        - "{{steps.fetch-active-wounds.output}}"
        - "{{steps.fetch-wound-assessments.output}}"
        - "{{steps.fetch-braden-scores.output}}"
    onSuccess: null
    onFailure: null
    timeout: 2m

  - name: submit-decision
    description: Submit wound care findings and recommendations to clinical decision queue
    tool: decision-queue.submit
    input:
      type: wound-care-review
      priority: "{{steps.analyze-healing-trajectory.output.priority}}"
      report: "{{steps.analyze-healing-trajectory.output}}"
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "all_wounds_healing == true"
    level: 1
    reason: All wounds on expected healing trajectory — auto-file daily report
  - condition: "new_stage_3_or_4 == true"
    level: 5
    reason: New Stage III/IV pressure ulcer — requires immediate physician notification and care plan update
  - condition: "deteriorating_wound == true"
    level: 4
    reason: Wound deterioration detected — requires wound care nurse and physician review

requiredConnectors:
  - pcc
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required:
    - facilityId
outputSchema:
  type: object
  properties:
    activeWoundCount:
      type: number
    healingOnTrack:
      type: number
    stalledWounds:
      type: array
    deterioratingWounds:
      type: array
    atRiskResidents:
      type: array

schedule: "0 6 * * *"
timeout: 5m
tags:
  - wound-care
  - pressure-ulcer
  - f686
  - cms-required
  - clinical-assessment
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
