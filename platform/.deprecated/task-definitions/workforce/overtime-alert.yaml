id: overtime-alert
name: Overtime Threshold Alert & Analysis
version: 1.0.0
domain: workforce
agentId: scheduling-agent
description: >
  Monitors employee hours in real time against overtime thresholds. Alerts when
  employees approach 40 hours (weekly OT) or 8/12 hours (daily OT in applicable
  states). Calculates projected overtime cost impact, identifies root causes
  (call-offs, vacancies, census spikes), and recommends mitigation strategies
  such as shift reassignment, PRN activation, or agency coverage. Excessive
  overtime correlates with increased med errors, falls, and staff turnover —
  this task is both a financial and clinical quality safeguard.

model: haiku
tools:
  - workday_get_timecards
  - workday_get_employee
  - workday_get_positions
maxTurns: 6

trigger:
  type: schedule
  config:
    cron: "0 14 * * *"
    timezone: facility_local

steps:
  - name: fetch-hours-worked
    description: Pull hours worked for all employees in current pay period from Workday
    tool: workday.time.getHoursWorked
    input:
      facilityId: "{{context.facilityId}}"
      payPeriod: current
      threshold: 32
    onSuccess: null
    onFailure: null
    timeout: 30s

  - name: fetch-remaining-schedule
    description: Pull remaining scheduled hours for the pay period
    tool: workday.scheduling.getRemainingShifts
    input:
      facilityId: "{{context.facilityId}}"
      payPeriod: current
    onSuccess: null
    onFailure: null
    timeout: 15s

  - name: calculate-projections
    description: Project overtime hours and cost impact based on current trajectory
    tool: claude.analyze
    input:
      prompt: overtime_projection_analysis
      context:
        - "{{steps.fetch-hours-worked.output}}"
        - "{{steps.fetch-remaining-schedule.output}}"
    onSuccess: null
    onFailure: null
    timeout: 1m

  - name: submit-decision
    description: Submit overtime alerts with mitigation recommendations to decision queue
    tool: decision-queue.submit
    input:
      type: overtime-alert
      priority: "{{steps.calculate-projections.output.priority}}"
      projections: "{{steps.calculate-projections.output}}"
      facilityId: "{{context.facilityId}}"
    onSuccess: null
    onFailure: null
    timeout: 10s

defaultGovernanceLevel: 3
governanceOverrides:
  - condition: "projected_ot_cost < 500"
    level: 2
    reason: Minimal overtime projected — auto-notify scheduler
  - condition: "projected_ot_cost > 5000"
    level: 4
    reason: Significant overtime projected — requires DON/administrator review
  - condition: "projected_ot_cost > 20000"
    level: 5
    reason: Excessive overtime — escalate to regional VP for staffing intervention

requiredConnectors:
  - workday
inputSchema:
  type: object
  properties:
    facilityId:
      type: string
  required:
    - facilityId
outputSchema:
  type: object
  properties:
    employeesApproachingOT:
      type: array
    projectedOvertimeHours:
      type: number
    projectedOvertimeCost:
      type: number
    mitigationRecommendations:
      type: array

schedule: "0 14 * * *"
timeout: 3m
tags:
  - overtime
  - staffing
  - cost-control
  - scheduling
createdAt: "2026-03-29T00:00:00Z"
updatedAt: "2026-03-29T00:00:00Z"
