# environments.config.yaml — source of truth for Managed Agents environments.
#
# Wave 3 (SNF-92). See: /Users/andrew/.claude/plans/shimmying-plotting-bear.md
#
# Edit this file to declare execution environments. Then run:
#   tsx platform/scripts/provision-environments.ts [--dry-run]
#
# Three environments are defined for SNF:
#   - snf-env-read-only:   analysis agents, no outbound network
#   - snf-env-staff-action: most department agents, github.com allowed
#                          for runbook checkout (session resource clone)
#   - snf-env-exec:         heavy-lift agents; pandas + openpyxl for
#                          briefing / spreadsheet generation
#
# SNF-138: Structure matches the Anthropic API's nested config format.
# Environment IDs are written back to the `id:` field — safe to commit.

environments:
  - name: snf-env-read-only
    config:
      type: cloud
      networking:
        type: limited
        allowed_hosts: []
        allow_mcp_servers: true
      packages:
        pip: []
        apt: []
    # id: env_xxx (written back by provision-environments.ts)

  - name: snf-env-staff-action
    config:
      type: cloud
      networking:
        type: limited
        allowed_hosts:
          - github.com
        allow_mcp_servers: true
      packages:
        pip: []
        apt: []

  - name: snf-env-exec
    config:
      type: cloud
      networking:
        type: limited
        allowed_hosts:
          - github.com
        allow_mcp_servers: true
      packages:
        pip:
          - pandas
          - openpyxl
        apt: []
