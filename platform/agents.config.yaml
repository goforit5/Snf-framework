# SNF Managed Agents — source of truth (Wave 4, SNF-93)
#
# This file is the only place where the 12 department agents are defined.
# `platform/scripts/provision-agents.ts` reads it, diffs each entry against
# `beta.agents.list(metadata: {platform: snf})`, and calls create/update as
# needed. Idempotent — re-running with no changes is a no-op.
#
# Multi-tenant model: tenant-per-vault-and-metadata. Agents are tenant-agnostic.
# Tenant context is passed per-session via session metadata and resolved to a
# vault at launch time by the session manager.
#
# PHI model: aggressive tokenization. Agents see `[RESIDENT_NNNN]` tokens only.
# Re-identification happens server-side inside `snf_action__execute_approved_action`.
#
# After provisioning, the script writes back resolved `id` and `version` for
# each agent. Those fields are committed back to this file by CI.

defaults:
  model: claude-sonnet-4-6
  environment: snf-env-staff-action
  mcp_gateway_base_url: https://mcp.ensign-snf.com
  metadata:
    platform: snf
    wave: "4"

agents:
  # -------------------------------------------------------------------------
  # 1. Clinical Operations
  # -------------------------------------------------------------------------
  - name: clinical-operations
    department: clinical
    model: claude-sonnet-4-6
    system_prompt_file: prompts/clinical.md
    runbook_file: runbooks/clinical.md
    environment: snf-env-staff-action
    mcp_servers:
      - { name: pcc, url: "${MCP_GATEWAY_BASE_URL}/pcc" }
      - { name: regulatory, url: "${MCP_GATEWAY_BASE_URL}/regulatory" }
      - { name: snf-hitl, url: "${MCP_GATEWAY_BASE_URL}/snf-hitl" }
      - { name: snf-action, url: "${MCP_GATEWAY_BASE_URL}/snf-action" }
    tools:
      - type: agent_toolset_20260401
        default_config:
          enabled: true
          permission_policy: { type: always_allow }
      - type: mcp_toolset
        mcp_server_name: pcc
        default_config: { enabled: true }
      - type: mcp_toolset
        mcp_server_name: regulatory
        default_config: { enabled: true }
      - type: mcp_toolset
        mcp_server_name: snf-hitl
        default_config:
          enabled: true
          permission_policy: { type: always_ask }
      - type: mcp_toolset
        mcp_server_name: snf-action
        default_config:
          enabled: true
