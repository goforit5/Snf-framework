name: Build & Push Platform

on:
  push:
    branches: [main]
    paths:
      - 'platform/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ORCHESTRATOR_REPO: snf-orchestrator
  GATEWAY_REPO: snf-mcp-gateway

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

  docker-build:
    needs: typecheck-and-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/infra/docker/Dockerfile
          push: false
          tags: ${{ env.ORCHESTRATOR_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build gateway image
        uses: docker/build-push-action@v6
        with:
          context: platform
          file: platform/infra/docker/Dockerfile.gateway
          push: false
          tags: ${{ env.GATEWAY_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push:
    if: github.ref == 'refs/heads/main'
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push orchestrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/infra/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ORCHESTRATOR_REPO }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ORCHESTRATOR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: platform
          file: platform/infra/docker/Dockerfile.gateway
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.GATEWAY_REPO }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.GATEWAY_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image URIs
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "### ECR Images Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | URI |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Orchestrator | \`${ECR_REGISTRY}/${ORCHESTRATOR_REPO}:${COMMIT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gateway | \`${ECR_REGISTRY}/${GATEWAY_REPO}:${COMMIT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
